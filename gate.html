<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الوصول الآمن | ابن قايد المريسي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #050505; color: #e4e4e7; }
        .glass-panel { background: rgba(20, 20, 25, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="status-card" class="glass-panel w-full max-w-md p-8 rounded-2xl text-center">
        <div id="loader" class="w-16 h-16 border-4 border-t-blue-500 border-gray-800 rounded-full animate-spin mx-auto mb-6"></div>
        <div id="icon" class="hidden mx-auto mb-6 w-16 h-16 flex items-center justify-center rounded-full"></div>
        
        <h1 id="title" class="text-2xl font-bold mb-3 text-white">جاري فحص التشفير...</h1>
        <p id="message" class="text-gray-400 text-sm leading-relaxed">بوابة نظام الحسابات V4.0 - ابن قايد المريسي</p>
        
        <div id="webview-warning" class="hidden mt-6 p-4 bg-yellow-500/10 border border-yellow-500/30 rounded-xl text-right">
            <p class="text-yellow-400 text-sm font-bold mb-3">⚠️ يبدو أنك تستخدم متصفحاً مدمجاً داخل تطبيق</p>
            <p class="text-yellow-300/70 text-xs mb-4">لضمان عمل النظام بشكل صحيح، افتح الرابط في متصفح Chrome أو Safari</p>
            <button id="copy-btn" onclick="copyLink()" class="w-full py-3 px-4 bg-yellow-500/20 border border-yellow-500/40 rounded-lg text-yellow-400 font-bold text-sm">📋 نسخ الرابط</button>
            <button onclick="openInBrowser()" class="w-full mt-2 py-3 px-4 bg-blue-500/20 border border-blue-500/40 rounded-lg text-blue-400 font-bold text-sm">🌐 فتح في Chrome</button>
        </div>
    </div>

    <script>
        const SECRET_KEY = "MURISI_V3";
        var targetUrl = '';

        function isWebView() {
            var ua = navigator.userAgent || '';
            return /FBAN|FBAV|Instagram|Twitter|Line|WhatsApp|Snapchat|TikTok|wv|WebView/i.test(ua);
        }

        function copyLink() {
            var url = targetUrl || window.location.href;
            if(navigator.clipboard) {
                navigator.clipboard.writeText(url).then(function() {
                    document.getElementById('copy-btn').innerHTML = '✅ تم النسخ!';
                    setTimeout(function() { document.getElementById('copy-btn').innerHTML = '📋 نسخ الرابط'; }, 3000);
                }).catch(function() { prompt('انسخ:', url); });
            } else { prompt('انسخ:', url); }
        }

        function openInBrowser() {
            var url = targetUrl || window.location.href;
            window.open('intent://' + url.replace(/^https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end', '_blank');
        }

        function decipherToken(token) {
            try {
                const cipher = atob(token);
                let decodedData = "";
                for(let i = 0; i < cipher.length; i++){
                    decodedData += String.fromCharCode(cipher.charCodeAt(i) ^ SECRET_KEY.charCodeAt(i % SECRET_KEY.length));
                }
                return JSON.parse(decodeURIComponent(decodedData));
            } catch(e) { return null; }
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const titleEl = document.getElementById('title');
            const msgEl = document.getElementById('message');
            const loader = document.getElementById('loader');
            const icon = document.getElementById('icon');
            const webviewWarn = document.getElementById('webview-warning');

            function showState(isSuccess, title, msg) {
                loader.classList.add('hidden');
                icon.classList.remove('hidden');
                icon.classList.add(isSuccess ? 'bg-green-500/10' : 'bg-red-500/10', isSuccess ? 'text-green-500' : 'text-red-500');
                icon.innerHTML = isSuccess ? 
                    `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>` : 
                    `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>`;
                titleEl.innerText = title;
                msgEl.innerText = msg;
            }

            if (!token) { showState(false, "وصول مرفوض", "لا يوجد تصريح دخول صالح."); return; }

            const data = decipherToken(token);
            if (!data || !data.u || !data.e) { showState(false, "رابط تالف", "بنية التشفير غير صحيحة."); return; }
            if (Date.now() > data.e) { showState(false, "انتهت الصلاحية", "انقضت مدة الرابط."); return; }

            targetUrl = data.u;

            if (isWebView()) {
                showState(false, "⚠️ متصفح مدمج", "افتح الرابط في Chrome أو Safari.");
                webviewWarn.classList.remove('hidden');
                return;
            }

            showState(true, "تم التصريح", "جاري توجيهك...");
            setTimeout(() => { window.location.replace(data.u); }, 1500);
        };
    </script>
</body>
</html>
