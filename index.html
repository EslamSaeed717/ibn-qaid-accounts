<script type="text/babel">
const inp=(err)=>({width:'100%',padding:'11px 13px',background:err?'#fef2f2':'#f8fafc',border:`1.5px solid ${err?'#fca5a5':'#e2e8f0'}`,borderRadius:12,outline:'none',fontSize:15,boxSizing:'border-box'});
const chip=(on)=>({padding:'8px 14px',borderRadius:10,border:`1.5px solid ${on?B.purple:'#e2e8f0'}`,background:on?B.purple:'white',color:on?'white':'#64748b',fontSize:13,fontWeight:700,cursor:'pointer'});
const Fld=({label,req,err,errMsg,children})=><div style={{marginBottom:10}}><label style={{display:'flex',alignItems:'center',gap:4,fontSize:13,fontWeight:700,color:err?'#ef4444':'#64748b',marginBottom:3}}>{label}{req&&<span style={{color:'#ef4444'}}>*</span>}{err&&<span style={{fontSize:10,color:'#ef4444',background:'#fef2f2',padding:'1px 6px',borderRadius:4}}>⚠ {errMsg||'مطلوب'}</span>}</label>{children}</div>;
const Toast=({msg,type,onClose})=>{useEffect(()=>{const t=setTimeout(onClose,4000);return()=>clearTimeout(t);},[]);const c={success:{bg:'#dcfce7',color:'#16a34a',icon:'✓'},error:{bg:'#fef2f2',color:'#dc2626',icon:'✕'},info:{bg:'#dbeafe',color:'#1d4ed8',icon:'ℹ'}}[type]||{bg:'#dbeafe',color:'#1d4ed8',icon:'ℹ'};return<div className="toast" style={{background:c.bg,color:c.color}}><span style={{fontSize:16}}>{c.icon}</span>{msg}</div>;};

const ProgressSteps=({current,total,labels})=>{
  const icons=['📋','👤','🪪','📍','💰','✍','📷'];
  return(<div><div className="progress-steps">{Array.from({length:total},(_,i)=>{const done=i<current-1;const active=i===current-1;return<div key={i} className="progress-step"><div className={`progress-dot ${done?'completed':active?'active':''}`}>{done?'✓':icons[i]||i+1}</div><div className={`progress-label ${done?'completed':active?'active':''}`}>{labels?.[i]||''}</div></div>;})}</div><div className="progress-bar-track"><div className="progress-bar-fill" style={{width:`${((current-1)/(total-1))*100}%`}}/></div></div>);
};

const DatePicker=({value,onChange,err,minY,maxY})=>{
  const[day,setDay]=useState('');const[month,setMonth]=useState('');const[year,setYear]=useState('');const init=useRef(false);
  useEffect(()=>{if(value&&/^\d{4}-\d{2}-\d{2}$/.test(value)){const p=value.split('-');setYear(p[0]);setMonth(String(parseInt(p[1])));setDay(String(parseInt(p[2])));}else if(!value&&init.current){setDay('');setMonth('');setYear('');}init.current=true;},[value]);
  const handleChange=(part,val)=>{let d=day,m=month,y=year;if(part==='day'){setDay(val);d=val;}if(part==='month'){setMonth(val);m=val;}if(part==='year'){setYear(val);y=val;}if(y&&m&&d){const dim=new Date(parseInt(y),parseInt(m),0).getDate();if(parseInt(d)<=dim)onChange(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);}else if(!y&&!m&&!d)onChange('');};
  const style={width:'100%',padding:'10px',background:err?'#fef2f2':'#f8fafc',border:`1.5px solid ${err?'#fca5a5':'#e2e8f0'}`,borderRadius:8,outline:'none',fontSize:15};
  const years=[];for(let i=(maxY||2026);i>=(minY||1950);i--)years.push(i);
  const months=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  const dim=year&&month?new Date(parseInt(year),parseInt(month),0).getDate():31;
  return(<div><div style={{display:'flex',gap:6}}><select style={{...style,flex:1}} value={day} onChange={e=>handleChange('day',e.target.value)}><option value="">اليوم</option>{Array.from({length:dim},(_,i)=><option key={i+1} value={i+1}>{i+1}</option>)}</select><select style={{...style,flex:1.3}} value={month} onChange={e=>handleChange('month',e.target.value)}><option value="">الشهر</option>{months.map((n,i)=><option key={i+1} value={i+1}>{n}</option>)}</select><select style={{...style,flex:1.3}} value={year} onChange={e=>handleChange('year',e.target.value)}><option value="">السنة</option>{years.map(y=><option key={y} value={y}>{y}</option>)}</select></div>{value&&/^\d{4}-\d{2}-\d{2}$/.test(value)&&<div style={{marginTop:6,fontSize:13,fontWeight:700,color:B.purple,background:'#f0fdf4',padding:'6px 10px',borderRadius:8,textAlign:'center'}}>{new Date(value).toLocaleDateString('ar-YE',{year:'numeric',month:'long',day:'numeric'})}</div>}</div>);
};

const SignatureModal=({label,onSave,onClose,init})=>{
  const ref=useRef(null);const[dr,setDr]=useState(false);const[has,setHas]=useState(!!init);
  useEffect(()=>{const c=ref.current,p=c.parentElement;c.width=p.clientWidth;c.height=p.clientHeight;const ctx=c.getContext('2d');ctx.lineWidth=3;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle=B.purple;if(init){const img=new Image();img.onload=()=>{ctx.drawImage(img,0,0,c.width,c.height);setHas(true);};img.src=init;}},[]);
  const gp=(e)=>{const r=ref.current.getBoundingClientRect();return{x:(e.clientX??e.touches?.[0]?.clientX)-r.left,y:(e.clientY??e.touches?.[0]?.clientY)-r.top};};
  const st=(e)=>{e.preventDefault();const p=gp(e);const ctx=ref.current.getContext('2d');ctx.beginPath();ctx.moveTo(p.x,p.y);setDr(true);};
  const mv=(e)=>{e.preventDefault();if(!dr)return;const p=gp(e);const ctx=ref.current.getContext('2d');ctx.lineTo(p.x,p.y);ctx.stroke();setHas(true);};
  const en=()=>setDr(false);
  const cl=()=>{ref.current.getContext('2d').clearRect(0,0,ref.current.width,ref.current.height);setHas(false);};
  return(<div className="modal-overlay" onClick={onClose}><div className="modal-content slide-up" onClick={e=>e.stopPropagation()} style={{display:'flex',flexDirection:'column',height:'80vh',maxHeight:'500px'}}><div style={{background:B.purple,color:'white',padding:'16px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><h3 style={{margin:0,fontSize:18,fontWeight:800}}>✍ {label}</h3><button onClick={onClose} style={{background:'none',color:'white',fontSize:24}}>&times;</button></div><div style={{flex:1,background:'#f8fafc',position:'relative',cursor:'crosshair'}}>{!has&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none',color:'#cbd5e1',fontSize:28,fontWeight:900,opacity:0.5}}>وقّع هنا</div>}<canvas ref={ref} style={{width:'100%',height:'100%',touchAction:'none'}} onMouseDown={st} onMouseMove={mv} onMouseUp={en} onMouseLeave={en} onTouchStart={st} onTouchMove={mv} onTouchEnd={en}/></div><div style={{padding:16,display:'flex',gap:12,background:'white',borderTop:'1px solid #e2e8f0'}}><button onClick={cl} style={{flex:1,padding:14,background:'#fef2f2',color:'#dc2626',borderRadius:12,fontSize:16,fontWeight:800}}>🔄 مسح</button><button onClick={()=>{if(has)onSave(ref.current.toDataURL());onClose();}} disabled={!has} style={{flex:2,padding:14,background:has?B.purple:'#cbd5e1',color:'white',borderRadius:12,fontSize:16,fontWeight:800}}>✅ حفظ</button></div></div></div>);
};
const SigBox=({onClick,label,val})=>(<div onClick={onClick} style={{border:`2px dashed ${val?B.purple:'#cbd5e1'}`,borderRadius:12,padding:14,background:val?B.light:'#f8fafc',textAlign:'center',cursor:'pointer',minHeight:100,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',transition:'all 0.2s'}}>{val?<img src={val} style={{maxHeight:70,maxWidth:'100%'}} alt=""/>:<div style={{color:'#94a3b8',fontSize:13,fontWeight:700}}><i className="fas fa-pen-nib" style={{fontSize:22,display:'block',marginBottom:8,color:B.orange}}/>{label}</div>}</div>);
</script>

<script type="text/babel">
const LoginScreen=({onLogin,onPublicForm})=>{
  const[username,setUsername]=useState('');const[pass,setPass]=useState('');const[err,setErr]=useState('');const[loading,setLoading]=useState(false);const[showPass,setShowPass]=useState(false);const[shaking,setShaking]=useState(false);
  const settings=DB.get('settings');
  const doShake=()=>{setShaking(true);setTimeout(()=>setShaking(false),500);};
  const go=()=>{
    setLoading(true);
    setTimeout(()=>{
      const admin=DB.get('admin');
      if(username===admin.username&&pass===admin.password)return onLogin({...admin});
      const users=DB.get('users')||[];
      const user=users.find(u=>u.username===username&&u.password===pass&&u.active);
      if(user){if(!settings.systemActive){setErr('النظام متوقف حالياً');setLoading(false);doShake();return;}return onLogin({...user});}
      setErr('بيانات الدخول غير صحيحة');setLoading(false);doShake();
    },500);
  };
  return(<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:`linear-gradient(135deg,${B.dark},${B.purple})`,padding:16}}><div className={shaking?'shake':''} style={{width:'100%',maxWidth:420,background:'white',borderRadius:28,overflow:'hidden',boxShadow:'0 30px 60px rgba(0,0,0,0.3)'}}><div style={{height:5,background:`linear-gradient(90deg,${B.orange},${B.purple})`}}/><div style={{padding:'40px 32px 32px'}}><div style={{textAlign:'center',marginBottom:32}}><img src={LOGO} style={{height:80,marginBottom:12}} alt=""/><h1 style={{fontSize:22,fontWeight:900,color:B.purple}}>نظام فتح الحسابات</h1><p style={{fontSize:11,color:'#94a3b8',marginTop:4}}>ابن قايد المريسي للصرافة والتحويلات | V3.1</p>{!settings.systemActive&&<div className="badge badge-red" style={{marginTop:8,fontSize:12}}>⚠ النظام متوقف</div>}</div>{err&&<div className="fade-in" style={{padding:10,background:'#fef2f2',color:'#dc2626',borderRadius:10,marginBottom:14,fontSize:13,fontWeight:700}}>⚠ {err}</div>}<div style={{marginBottom:14}}><label style={{fontSize:11,fontWeight:700,color:'#64748b',marginBottom:4,display:'block'}}>اسم المستخدم</label><input type="text" value={username} onChange={e=>{setUsername(e.target.value);setErr('');}} placeholder="أدخل اسم المستخدم" onKeyDown={e=>e.key==='Enter'&&go()} style={inp()}/></div><div style={{marginBottom:24}}><label style={{fontSize:11,fontWeight:700,color:'#64748b',marginBottom:4,display:'block'}}>كلمة المرور</label><div style={{position:'relative'}}><input type={showPass?'text':'password'} value={pass} onChange={e=>{setPass(e.target.value);setErr('');}} placeholder="أدخل كلمة المرور" onKeyDown={e=>e.key==='Enter'&&go()} style={{...inp(),paddingLeft:44}}/><button onClick={()=>setShowPass(!showPass)} style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',background:'none',color:'#94a3b8',fontSize:18,padding:4}}>{showPass?'🙈':'👁'}</button></div></div><button onClick={go} disabled={loading||!username||!pass} style={{width:'100%',padding:14,background:loading?'#94a3b8':B.purple,color:'white',borderRadius:14,fontSize:16,fontWeight:900}}>{loading?'جارٍ التحقق...':'تسجيل الدخول'}</button>{settings.systemActive&&<button onClick={onPublicForm} style={{width:'100%',marginTop:14,padding:14,background:'white',color:B.purple,border:`2px solid ${B.orange}`,borderRadius:14,fontSize:14,fontWeight:800}}>📝 تقديم طلب فتح حساب جديد</button>}</div></div></div>);
};
</script>

<script type="text/babel">
const AdminPanel=({user,onLogout})=>{
  const[tab,setTab]=useState('submissions');
  const[subs,setSubs]=useState(DB.get('submissions')||[]);
  const[users,setUsers]=useState(DB.get('users')||[]);
  const[settings,setSettings]=useState(DB.get('settings'));
  const[admin,setAdmin]=useState(DB.get('admin'));
  const[toast,setToast]=useState(null);
  const[selectedSub,setSelectedSub]=useState(null);
  const[showPDF,setShowPDF]=useState(null);
  const[newUser,setNewUser]=useState({username:'',password:'',branch:'',active:true});
  const[editList,setEditList]=useState(null);const[newItem,setNewItem]=useState('');
  const[searchQ,setSearchQ]=useState('');const[filterStatus,setFilterStatus]=useState('');const[filterBranch,setFilterBranch]=useState('');

  const isAdmin=user.role==='admin';
  const refresh=()=>{setSubs(DB.get('submissions')||[]);setUsers(DB.get('users')||[]);setSettings(DB.get('settings'));setAdmin(DB.get('admin'));};
  const showMsg=(msg,type='success')=>setToast({msg,type});
  const saveSetting=(key,val)=>{const s={...settings,[key]:val};DB.set('settings',s);setSettings(s);};

  const stats=useMemo(()=>({total:subs.length,pending:subs.filter(s=>s.status==='pending').length,approved:subs.filter(s=>s.status==='approved').length,rejected:subs.filter(s=>s.status==='rejected').length,today:subs.filter(s=>s.submittedAt===isoDate()).length}),[subs]);

  const filteredSubs=useMemo(()=>{
    let r=[...subs];
    if(searchQ){const q=searchQ.toLowerCase();r=r.filter(s=>(s.fullName||'').toLowerCase().includes(q)||(s.idNumber||'').includes(q)||(s.id||'').includes(q));}
    if(filterStatus)r=r.filter(s=>s.status===filterStatus);
    if(filterBranch)r=r.filter(s=>s.branch===filterBranch);
    return r.sort((a,b)=>(b.id||'').localeCompare(a.id||''));
  },[subs,searchQ,filterStatus,filterBranch]);

  const updateSubStatus=(id,status)=>{const s=subs.map(x=>x.id===id?{...x,status,reviewedBy:user.username,reviewDate:isoDate()}:x);DB.set('submissions',s);setSubs(s);showMsg(status==='approved'?'تمت الموافقة ✅':'تم الرفض ❌',status==='approved'?'success':'error');};

  // التعديل 2: التصفير الهرمي الكامل
  useEffect(()=>{uf('birthGov','');uf('birthDistrict','');uf('birthArea','');uf('address','');},[fd.country]);
  useEffect(()=>{uf('birthDistrict','');uf('birthArea','');uf('address','');},[fd.birthGov]);
  useEffect(()=>{uf('birthArea','');uf('address','');},[fd.birthDistrict]);

  const validate=(s)=>{
    const e={};
    if(s===1&&!fd.termsAccepted)e.terms='يجب الموافقة';
    if(s===2){if(req('names'))fd.names.forEach((n,i)=>{if(i<nameCount&&!n.trim())e[`name_${i}`]='مطلوب';});if(req('nickname')&&!fd.nickname.trim())e.nickname='مطلوب';if(fd.accountType==='تجاري'){if(req('businessName')&&!fd.businessName)e.businessName='مطلوب';if(req('legalForm')&&!fd.legalForm)e.legalForm='مطلوب';}}
    if(s===3){if(req('idNumber')&&!fd.idNumber)e.idNumber='مطلوب';else if(fd.idNumber&&fd.idNumber.length!==idRule.digits)e.idNumber=`يجب ${idRule.digits} رقم`;if(req('idIssueDate')&&!/^\d{4}-\d{2}-\d{2}$/.test(fd.idIssueDate))e.idIssueDate='غير مكتمل';if(req('idIssuePlace')&&!fd.idIssuePlace)e.idIssuePlace='مطلوب';if(req('birthDate')&&!/^\d{4}-\d{2}-\d{2}$/.test(fd.birthDate))e.birthDate='غير مكتمل';else if(fd.birthDate&&calcAge(fd.birthDate)<settings.minAge)e.birthDate=`العمر أقل من ${settings.minAge}`;}

    if(s===7&&req('photos')){const photos=getPhotoConfig();if(photos.some(p=>!fd.idPhotos[p.id]))e.photos='أرفق الصور';}
    return e;
  };
  const nx=()=>{const er=validate(step);if(Object.keys(er).length===0){setErrs({});setStep(s=>Math.min(s+1,T));}else{setErrs(er);setToast({msg:'أكمل الحقول الإلزامية',type:'error'});setShakeBtn(true);setTimeout(()=>setShakeBtn(false),500);}};
  const submitForm=()=>{let allE={};for(let i=1;i<=T;i++)Object.assign(allE,validate(i));if(Object.keys(allE).length>0){setErrs(allE);setToast({msg:'هناك حقول ناقصة',type:'error'});return;}const fullName=[...fd.names,fd.nickname].filter(Boolean).join(' ');const finalMobile=fd.mobileType==='yemeni'?'+967'+fd.mobile:fd.countryCode+fd.mobile;const seqId=nextSeqId();const sub={...fd,fullName,mobile:finalMobile,id:seqId,status:'pending',submittedAt:isoDate()};const subs=DB.get('submissions')||[];DB.set('submissions',[...subs,sub]);setSubData(sub);setSubmitted(true);try{sendNotification(sub);}catch(e){}};
  const getPhotoConfig=()=>{if(fd.idType.includes('شخصية')||fd.idType.includes('ذكية')||fd.idType.includes('عائلية'))return[{id:'front',label:'الوجه الأمامي'},{id:'back',label:'الوجه الخلفي'}];if(fd.idType.includes('جواز'))return[{id:'passport',label:'صفحة البيانات'}];return[{id:'main',label:'صورة الهوية'}];};
  
  // التعديل 3: محرك ضغط الصور لمنع الانهيار الصامت

    if(!file)return;
    const r=new FileReader();
    r.onload=(e)=>{
      const img=new Image();
      img.onload=()=>{
        const cvs=document.createElement('canvas');
        const MW=800; const MH=800;
        let w=img.width; let h=img.height;
        if(w>h){if(w>MW){h*=MW/w;w=MW;}}else{if(h>MH){w*=MH/h;h=MH;}}
        cvs.width=w; cvs.height=h;

        const comp=cvs.toDataURL('image/jpeg',0.6);
        setFd(p=>({...p,idPhotos:{...p.idPhotos,[id]:comp}}));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  };

  // التعديل 4: جلب المناطق

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,fontSize:12}}>
            {[['الاسم',subData.fullName],['الهوية',subData.idNumber],['الجوال',subData.mobile],['الفرع',subData.branch||'—'],['العملات',subData.currencies?.join(', ')]].map(([k,v],i)=><div key={i}><strong>{k}:</strong> {v||'—'}</div>)}
          </div>

      </div>

  );

  return(

      {activeSig!==null&&<SignatureModal label={activeSig==='main'?'التوقيع الرئيسي':`نموذج ${activeSig+1}`} init={activeSig==='main'?fd.mainSignature:fd.sampleSignatures[activeSig]} onSave={img=>{if(activeSig==='main')uf('mainSignature',img);else{const s=[...fd.sampleSignatures];s[activeSig]=img;uf('sampleSignatures',s);}}} onClose={()=>setActiveSig(null)}/>}
      <div className="no-print" style={{maxWidth:700,margin:'0 auto'}}>
        <div style={{marginBottom:14}}><button onClick={onBack} style={{padding:'8px 14px',background:'white',border:'1px solid #e2e8f0',borderRadius:10,fontSize:13,fontWeight:700,color:'#64748b'}}>↩ العودة</button></div>
        <div className="card">
          <div className="card-header">
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}><img src={LOGO} style={{height:42}} alt=""/><div><p style={{margin:0,fontSize:11,fontWeight:800,color:B.orange}}>مرحلة {step} من {T}</p><h2 style={{margin:0,fontSize:18,fontWeight:900,color:B.purple}}>{stepLabels[step-1]}</h2></div></div>
            <ProgressSteps current={step} total={T} labels={stepLabels}/>
          </div>
          <div className="card-body">
            {step===1&&<div className="fade-in"><div style={{background:'#fffbeb',padding:16,borderRadius:16,marginBottom:20,maxHeight:300,overflowY:'auto',fontSize:14}}><h3 style={{color:B.purple,fontWeight:900,marginBottom:10}}>شروط فتح الحساب</h3><ul style={{paddingRight:20,lineHeight:2}}><li>تعبئة الاستمارة والتوقيع عليها.</li><li>إرفاق صورة الهوية سارية المفعول.</li><li>التوقيع أمام الموظف المختص.</li><li>الحساب لغرض الحوالات والمصارفة.</li><li>يتحمل العميل المسؤولية الكاملة.</li><li>يحق للمنشأة إغلاق الحساب عند المخالفة.</li></ul></div><label style={{display:'flex',alignItems:'center',gap:10,padding:14,background:fd.termsAccepted?B.light:'white',border:`2px solid ${errs.terms?'#fca5a5':fd.termsAccepted?B.purple:'#e2e8f0'}`,borderRadius:14,cursor:'pointer'}}><input type="checkbox" checked={fd.termsAccepted} onChange={e=>uf('termsAccepted',e.target.checked)} style={{width:20,height:20,accentColor:B.purple}}/><span style={{fontSize:14,fontWeight:700}}>أقر بموافقتي على الشروط</span></label>{errs.terms&&<p style={{color:'#dc2626',fontSize:12,marginTop:6}}>⚠ {errs.terms}</p>}</div>}
            {step===2&&<div className="fade-in"><Fld label="نوع الحساب"><div style={{display:'flex',gap:10}}>{['شخصي','تجاري'].map(t=><button key={t} onClick={()=>uf('accountType',t)} style={{...chip(fd.accountType===t),flex:1,textAlign:'center',padding:12}}>{t==='شخصي'?'👤':'🏢'} {t}</button>)}</div></Fld><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:8}}>{fd.names.map((n,i)=>i<nameCount&&<Fld key={i} label={nameLabels[i]||`اسم ${i+1}`} req={req('names')} err={errs[`name_${i}`]}><input style={inp(errs[`name_${i}`])} value={n} onChange={e=>updateName(i,e.target.value)}/></Fld>)}<Fld label="اللقب" req={req('nickname')} err={errs.nickname}><input style={inp(errs.nickname)} value={fd.nickname} onChange={e=>uf('nickname',e.target.value)}/></Fld></div>{fd.accountType==='تجاري'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:8}}><Fld label="الاسم التجاري" req={req('businessName')} err={errs.businessName}><input style={inp(errs.businessName)} value={fd.businessName} onChange={e=>uf('businessName',e.target.value)}/></Fld><Fld label="نوع النشاط"><input style={inp()} value={fd.businessType} onChange={e=>uf('businessType',e.target.value)}/></Fld><Fld label="الشكل القانوني" req={req('legalForm')} err={errs.legalForm}><select style={inp(errs.legalForm)} value={fd.legalForm} onChange={e=>uf('legalForm',e.target.value)}><option value="">اختر</option>{settings.legalForms.map(f=><option key={f}>{f}</option>)}</select></Fld></div>}</div>}

.max}/>{fd.birthDate&&/^\d{4}-\d{2}-\d{2}$/.test(fd.birthDate)&&<div style={{fontSize:11,color:calcAge(fd.birthDate)<settings.minAge?'#dc2626':'#16a34a',marginTop:4,fontWeight:700}}>العمر: {calcAge(fd.birthDate)} سنة</div>}</Fld></div></div>}
            
            {/* التعديل 5: القائمة المنسدلة الخاصة بالمنطقة/الحي للخطوة الرابعة */}
            {step===4&&<div className="fade-in" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <Fld label="الدولة" req={req('country')} err={errs.country}><select style={inp(errs.country)} value={fd.country} onChange={e=>uf('country',e.target.value)}><option value="">اختر</option>{(settings.countries||[]).map(c=><option key={c}>{c}</option>)}</select></Fld>
              {hasGeo?<>
                <Fld label="المحافظة" req={req('birthGov')} err={errs.birthGov}>{provinces.length>0?<select style={inp(errs.birthGov)} value={fd.birthGov} onChange={e=>uf('birthGov',e.target.value)}><option value="">اختر</option>{provinces.map(p=><option key={p}>{p}</option>)}</select>:<input style={inp(errs.birthGov)} value={fd.birthGov} onChange={e=>uf('birthGov',e.target.value)} placeholder="اكتب المحافظة"/></Fld>
                {fd.birthGov&&<Fld label="المديرية">{districts.length>0?<select style={inp()} value={fd.birthDistrict} onChange={e=>uf('birthDistrict',e.target.value)}><option value="">اختر</option>{districts.map(d=><option key={d}>{d}</option>)}</select>:<input style={inp()} value={fd.birthDistrict} onChange={e=>uf('birthDistrict',e.target.value)} placeholder="اكتب المديرية"/></Fld>}
                {fd.birthDistrict&&<Fld label="المنطقة / الحي">{areas.length>0?<select style={inp()} value={fd.birthArea} onChange={e=>uf('birthArea',e.target.value)}><option value="">اختر</option>{areas.map(a=><option key={a}>{a}</option>)}</select>:<input style={inp()} value={fd.birthArea} onChange={e=>uf('birthArea',e.target.value)} placeholder="اكتب المنطقة"/></Fld>}
                <div style={{gridColumn:'span 2'}}><Fld label="العنوان التفصيلي"><input style={inp()} value={fd.address} onChange={e=>uf('address',e.target.value)} placeholder="معلم بارز / الشارع"/></Fld></div>
              </>:<>
                <div style={{gridColumn:'span 1'}}><Fld label="المنطقة" req={req('birthGov')} err={errs.birthGov}><input style={inp(errs.birthGov)} value={fd.birthGov} onChange={e=>uf('birthGov',e.target.value)} placeholder="المنطقة/المحافظة"/></Fld></div>
                <div style={{gridColumn:'span 2'}}><Fld label="العنوان"><input style={inp()} value={fd.address} onChange={e=>uf('address',e.target.value)} placeholder="العنوان الكامل"/></Fld></div>
              </>}
              <div style={{gridColumn:'span 2',marginTop:10}}><Fld label="نوع الجوال"><div style={{display:'flex',gap:10}}>{[['yemeni','🇾🇪 يمني'],['intl','🌍 دولي']].map(([v,l])=><label key={v} style={{flex:1,padding:10,background:fd.mobileType===v?B.light:'#f8fafc',border:`1px solid ${fd.mobileType===v?B.purple:'#e2e8f0'}`,borderRadius:8,textAlign:'center',cursor:'pointer',fontWeight:700,fontSize:13}}><input type="radio" checked={fd.mobileType===v} onChange={()=>uf('mobileType',v)} style={{display:'none'}}/>{l}</label>)}</div></Fld><Fld label="رقم الجوال" req={req('mobile')} err={errs.mobile} errMsg={errs.mobile}><div style={{display:'flex',direction:'ltr',gap:5}}>{fd.mobileType==='yemeni'?<div style={{padding:'11px 16px',background:'#e2e8f0',borderRadius:'12px 0 0 12px',fontWeight:700,fontSize:14}}>967+</div>:<select style={{...inp(),width:120,borderRadius:'12px 0 0 12px'}} value={fd.countryCode} onChange={e=>uf('countryCode',e.target.value)}>{countryCodes.map(c=><option key={c.code} value={c.code}>{c.name} ({c.code})</option>)}</select>}<input style={{...inp(errs.mobile),borderRadius:'0 12px 12px 0',flex:1}} value={fd.mobile} onChange={e=>uf('mobile',e.target.value.replace(/\D/g,''))} placeholder="رقم الجوال"/></div></Fld></div>
              <Fld label="هاتف ثابت"><input style={inp()} value={fd.phone} onChange={e=>uf('phone',e.target.value)}/></Fld><Fld label="البريد"><input type="email" style={inp()} value={fd.email} onChange={e=>uf('email',e.target.value)}/></Fld>
              <div style={{gridColumn:'span 2'}}><Fld label="الفرع" req={req('branch')} err={errs.branch}><select style={inp(errs.branch)} value={fd.branch} onChange={e=>uf('branch',e.target.value)}><option value="">اختر</option>{settings.branches.map(b=><option key={b}>{b}</option>)}</select></Fld></div>
            </div>}
            
            {step===5&&<div className="fade-in"><Fld label="العملات" req={req('currencies')} err={errs.currencies} errMsg={errs.currencies}><div style={{display:'flex',flexWrap:'wrap',gap:8}}>{settings.currencies.map(c=><button key={c} onClick={()=>{const n=fd.currencies.includes(c)?fd.currencies.filter(x=>x!==c):[...fd.currencies,c];uf('currencies',n);}} style={chip(fd.currencies.includes(c))}>{c}</button>)}</div></Fld><div style={{height:20}}/><Fld label="وسائل الخدمة"><div style={{display:'flex',flexWrap:'wrap',gap:8}}>{settings.services.map(s=><button key={s} onClick={()=>{const n=fd.services.includes(s)?fd.services.filter(x=>x!==s):[...fd.services,s];uf('services',n);}} style={chip(fd.services.includes(s))}>{s}</button>)}</div></Fld></div>}
            {step===6&&<div className="fade-in"><h4 style={{fontSize:16,fontWeight:800,color:B.purple,marginBottom:12}}>نماذج التوقيعات <span style={{color:'#dc2626'}}>*</span></h4><div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>{[0,1,2].map(i=><SigBox key={i} onClick={()=>setActiveSig(i)} label={`نموذج ${i+1}`} val={fd.sampleSignatures[i]}/>)}</div>{errs.sampleSignatures&&<p style={{color:'#dc2626',fontSize:12,marginTop:8}}>⚠ {errs.sampleSignatures}</p>}<h4 style={{fontSize:16,fontWeight:900,color:B.purple,margin:'20px 0 12px'}}>التوقيع الرئيسي <span style={{color:'#dc2626'}}>*</span></h4><SigBox onClick={()=>setActiveSig('main')} label="اضغط للتوقيع" val={fd.mainSignature}/>{errs.mainSignature&&<p style={{color:'#dc2626',fontSize:12,marginTop:8}}>⚠ {errs.mainSignature}</p>}</div>}

<script type="text/babel">
const App=()=>{
  const[user,setUser]=useState(null);
  const[view,setView]=useState(()=>{
    const hash=window.location.hash;
    if(hash==='#admin')return 'login';
    return 'client'; 
  });

  useEffect(()=>{
    const handleHash=()=>{
      const hash=window.location.hash;
      if(hash==='#admin'){setView('login');setUser(null);}
      else{setView('client');setUser(null);}
    };
    window.addEventListener('hashchange',handleHash);
    return()=>window.removeEventListener('hashchange',handleHash);
  },[]);

  if(user)return<AdminPanel user={user} onLogout={()=>{setUser(null);setView('login');}}/>;
  if(view==='login')return<LoginScreen onLogin={setUser} onPublicForm={()=>setView('client')}/>;
  return<ClientForm onBack={()=>setView('login')}/>;
};
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
