                <div><p style={{fontSize:11,fontWeight:700,color:'#64748b',marginBottom:4}}>الميلاد (من-إلى)</p><div style={{display:'flex',gap:6}}><input type="number" style={Object.assign({},inp(),{fontSize:12,padding:6})} value={(settings.dateRanges||{}).birth?settings.dateRanges.birth.min:1950} onChange={function(e){savS('dateRanges',Object.assign({},settings.dateRanges,{birth:Object.assign({},(settings.dateRanges||{}).birth,{min:parseInt(e.target.value)})}));}}/><input type="number" style={Object.assign({},inp(),{fontSize:12,padding:6})} value={(settings.dateRanges||{}).birth?settings.dateRanges.birth.max:2012} onChange={function(e){savS('dateRanges',Object.assign({},settings.dateRanges,{birth:Object.assign({},(settings.dateRanges||{}).birth,{max:parseInt(e.target.value)})}));}}/></div></div>
              </div>
            </div>
            {/* PDF Settings */}
            <div className="settings-section"><div className="settings-title">📄 إعدادات PDF</div>
              <Fld label="أرقام الهواتف (بفاصلة)"><input style={inp()} value={((settings.pdf||{}).phones||[]).join(', ')} onChange={function(e){updPdf('phones',e.target.value.split(',').map(function(x){return x.trim();}).filter(Boolean));}}/></Fld>
              <Fld label="عنوان التذييل"><input style={inp()} value={(settings.pdf||{}).addr||''} onChange={function(e){updPdf('addr',e.target.value);}}/></Fld>
              <Fld label="نص الإقرار"><textarea style={Object.assign({},inp(),{minHeight:60,padding:10,resize:'vertical'})} value={(settings.pdf||{}).decl||''} onChange={function(e){updPdf('decl',e.target.value);}}/></Fld>
            </div>
            {/* Dynamic Lists */}
            {[['branches','🏢 الفروع'],['currencies','💰 العملات'],['services','📡 الخدمات'],['legalForms','⚖️ الأشكال القانونية']].map(function(pair) {
              var field = pair[0], title = pair[1];
              return <div key={field} className="settings-section"><div className="settings-title">{title}</div>
                {(settings[field]||[]).map(function(item,i) {
                  return <div key={i} style={{display:'flex',gap:6,marginBottom:4}}>
                    <input style={Object.assign({},inp(),{fontSize:12,padding:6})} value={item} onChange={function(e){updLI(field,i,e.target.value);}}/>
                    <button onClick={function(){remLI(field,i);}} style={{padding:'4px 10px',background:'#fef2f2',color:'#dc2626',borderRadius:6,fontSize:12}}>✕</button>
                  </div>;
                })}
                <div style={{display:'flex',gap:6,marginTop:6}}>
                  <input style={Object.assign({},inp(),{fontSize:12,padding:6})} placeholder="جديد..." value={editL===field?newItem:''} onFocus={function(){setEL(field);}} onChange={function(e){setNI(e.target.value);}} onKeyDown={function(e){if(e.key==='Enter')addLI(field);}}/>
                  <button onClick={function(){setEL(field);addLI(field);}} style={{padding:'6px 12px',background:B.p,color:'white',borderRadius:6,fontSize:12,fontWeight:700}}>+</button>
                </div>
              </div>;
            })}
            {/* Reset */}
            <button onClick={function(){if(confirm('إعادة ضبط؟')){DB.reset();refresh();msg('تم','info');}}} style={{padding:'10px 20px',background:'#dc2626',color:'white',borderRadius:10,fontSize:13,fontWeight:700,marginTop:10}}>⚠️ إعادة ضبط</button>
          </div>}
        </div>
      </div>
    </div>
  );
};
</script>
<!-- MODULE 5: Client Form -->
<script type="text/babel">
var ClientForm = function(props) {
  var settings = DB.get('settings') || {};
  var reqF = settings.reqFields || [];
  var _step = useState(1), step = _step[0], setStep = _step[1];
  var T = 7;
  var _errs = useState({}), errs = _errs[0], setErrs = _errs[1];
  var _toast = useState(null), toast = _toast[0], setToast = _toast[1];
  var _done = useState(false), done = _done[0], setDone = _done[1];
  var _subD = useState(null), subD = _subD[0], setSubD = _subD[1];
  var _sig = useState(null), actSig = _sig[0], setActSig = _sig[1];
  var _shk = useState(false), shk = _shk[0], setShk = _shk[1];
  var NC = Math.max(settings.minNames || 4, 3);
  var nLabels = ['الاسم الأول','اسم الأب','اسم الجد','الاسم الرابع','الخامس','السادس'];
  var sLabels = ['الشروط','البيانات','الهوية','العنوان','العملات','التوقيعات','المرفقات'];

  var _fd = useState({
    acType:'شخصي',names:Array(NC).fill(''),nickname:'',
    bName:'',bType:'',lForm:'',
    idType:Object.keys(settings.idRules||{})[0]||'بطاقة شخصية',idNum:'',idIssue:'',idExp:'',idPlace:'',
    bDate:'',country:'اليمن',gov:'',dist:'',addr:'',
    mobType:'yemeni',mob:'',cCode:'+967',phone:'',email:'',branch:'',
    currs:[],svcs:[],auth:[{name:'',id:'',phone:'',perms:[],sig:null}],
    sSigs:[null,null,null],mSig:null,photos:{},agree:false
  }), fd = _fd[0], setFd = _fd[1];

  var uf = function(f,v) { setFd(function(p) { var n = Object.assign({},p); n[f]=v; return n; }); setErrs(function(p) { var n = Object.assign({},p); delete n[f]; return n; }); };
  var updName = function(i,v) { var n = fd.names.slice(); n[i]=v; uf('names',n); setErrs(function(p){var e=Object.assign({},p);delete e['n_'+i];return e;}); };
  var rule = (settings.idRules||{})[fd.idType] || {digits:11,expYrs:10};
  var req = function(f) { return reqF.includes(f); };

  useEffect(function() {
    if (fd.idIssue && /^\d{4}-\d{2}-\d{2}$/.test(fd.idIssue) && rule) {
      uf('idExp', addYears(fd.idIssue, rule.expYrs, rule.minusDay));
    }
  }, [fd.idIssue, fd.idType]);

  useEffect(function() { uf('gov',''); uf('dist',''); uf('addr',''); }, [fd.country]);
  useEffect(function() { uf('dist',''); }, [fd.gov]);

  var val = function(s) {
    var e = {};
    if (s===1 && !fd.agree) e.agree='يجب الموافقة';
    if (s===2) {
      if (req('names')) { for (var i=0; i<NC; i++) { if (!fd.names[i] || !fd.names[i].trim()) e['n_'+i]='مطلوب'; } }
      if (req('nickname') && !fd.nickname.trim()) e.nickname='مطلوب';
      if (fd.acType==='تجاري' && req('businessName') && !fd.bName) e.bName='مطلوب';
    }
    if (s===3) {
      if (req('idNumber') && !fd.idNum) e.idNum='مطلوب';
      else if (fd.idNum && fd.idNum.length!==rule.digits) e.idNum='يجب '+rule.digits+' رقم';
      if (req('idIssueDate') && !/^\d{4}-\d{2}-\d{2}$/.test(fd.idIssue)) e.idIssue='غير مكتمل';
      if (req('idIssuePlace') && !fd.idPlace) e.idPlace='مطلوب';
      if (req('birthDate') && !/^\d{4}-\d{2}-\d{2}$/.test(fd.bDate)) e.bDate='غير مكتمل';
      else if (fd.bDate && calcAge(fd.bDate) < (settings.minAge||14)) e.bDate='العمر أقل من '+(settings.minAge||14);
    }
    if (s===4) {
      if (req('country') && !fd.country) e.country='مطلوب';
      if (req('birthGov') && !fd.gov) e.gov='مطلوب';
      if (req('mobile') && !fd.mob) e.mob='مطلوب';
      else if (fd.mobType==='yemeni' && fd.mob && !/^(77|71|70|73|78)\d{7}$/.test(fd.mob)) e.mob='رقم يمني غير صالح';
      if (req('branch') && !fd.branch) e.branch='مطلوب';
    }
    if (s===5 && req('currencies') && fd.currs.length===0) e.currs='اختر عملة';
    if (s===6) {
      if (req('sampleSigs') && fd.sSigs.some(function(x){return !x;})) e.sSigs='أكمل التوقيعات';
      if (req('mainSig') && !fd.mSig) e.mSig='مطلوب';
    }
    if (s===7 && req('photos')) {
      var pc = getPhotoConf();
      if (pc.some(function(p){return !fd.photos[p.id];})) e.photos='أرفق الصور';
    }
    return e;
  };

  var nx = function() {
    var er = val(step);
    if (Object.keys(er).length === 0) { setErrs({}); setStep(function(s){return Math.min(s+1,T);}); }
    else { setErrs(er); setToast({msg:'أكمل الحقول الإلزامية',type:'error'}); setShk(true); setTimeout(function(){setShk(false);},500); }
  };

  var submit = function() {
    var allE = {};
    for (var i=1; i<=T; i++) Object.assign(allE, val(i));
    if (Object.keys(allE).length > 0) { setErrs(allE); setToast({msg:'حقول ناقصة',type:'error'}); return; }
    var fullName = fd.names.concat([fd.nickname]).filter(Boolean).join(' ');
    var finalMob = fd.mobType==='yemeni' ? '+967'+fd.mob : fd.cCode+fd.mob;
    var sid = nextSeq();
    var sub = Object.assign({}, fd, {fullName:fullName, mobile:finalMob, idNumber:fd.idNum, idType:fd.idType, idIssueDate:fd.idIssue, idExpiry:fd.idExp, birthDate:fd.bDate, birthGov:fd.gov, birthDistrict:fd.dist, address:fd.addr, currencies:fd.currs, services:fd.svcs, sampleSignatures:fd.sSigs, mainSignature:fd.mSig, idPhotos:fd.photos, id:sid, status:'pending', submittedAt:isoDate()});
    var subs = DB.get('submissions') || [];
    DB.set('submissions', subs.concat([sub]));
    setSubD(sub); setDone(true);
    try { notify(sub); } catch(e) {}
  };

  var getPhotoConf = function() {
    if (fd.idType.indexOf('شخصية')>=0 || fd.idType.indexOf('ذكية')>=0 || fd.idType.indexOf('عائلية')>=0) return [{id:'front',label:'الأمامي'},{id:'back',label:'الخلفي'}];
    if (fd.idType.indexOf('جواز')>=0) return [{id:'passport',label:'صفحة البيانات'}];
    return [{id:'main',label:'صورة الهوية'}];
  };
  var handlePhoto = function(id, file) {
    if (!file) return;
    var r = new FileReader();
    r.onload = function(e) { setFd(function(p) { var n = Object.assign({},p); n.photos = Object.assign({},p.photos); n.photos[id] = e.target.result; return n; }); };
    r.readAsDataURL(file);
  };
  var ti = function(field, v) { setFd(function(p) { var n = Object.assign({},p); n[field] = p[field].includes(v) ? p[field].filter(function(x){return x!==v;}) : p[field].concat([v]); return n; }); };

  var provs = getProvs(fd.country);
  var dists = getDists(fd.country, fd.gov);
  var hasGeo = typeof worldGeoData !== 'undefined' && worldGeoData[fd.country];

  if (done) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f1f5f9',padding:16}}>
      <div className="fade-in" style={{textAlign:'center',background:'white',padding:'40px 24px',borderRadius:24,boxShadow:'0 10px 30px rgba(0,0,0,.1)',maxWidth:500,width:'100%'}}>
        <div style={{width:80,height:80,borderRadius:'50%',background:'#dcfce7',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px',fontSize:40}}>✅</div>
        <h2 style={{color:B.p,fontWeight:900,marginBottom:8}}>تم تقديم الطلب بنجاح!</h2>
        <p style={{color:'#16a34a',fontSize:15,fontWeight:700}}>تم رفع طلبكم إلى الإدارة</p>
        <p style={{color:'#64748b',fontSize:14}}>المرجع: <strong style={{color:B.p,fontSize:18}}>{subD.id}</strong></p>
        <div style={{textAlign:'right',background:'#f8fafc',borderRadius:14,padding:16,border:'1px solid #e2e8f0',margin:'20px 0',fontSize:12}}>
          {[['الاسم',subD.fullName],['الهوية',subD.idNumber],['الجوال',subD.mobile],['الفرع',subD.branch||'—']].map(function(p) {
            return <div key={p[0]}><strong>{p[0]}:</strong> {p[1]||'—'}</div>;
          })}
        </div>
        <button onClick={props.onBack} style={{padding:'12px 30px',background:B.p,color:'white',borderRadius:12,fontSize:14,fontWeight:800}}>↩ العودة</button>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',background:'#f1f5f9',padding:'16px 10px'}}>
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={function(){setToast(null);}}/>}
      {actSig !== null && <SignatureModal
        label={actSig==='main'?'التوقيع الرئيسي':'نموذج '+(actSig+1)}
        init={actSig==='main'?fd.mSig:fd.sSigs[actSig]}
        onSave={function(img) {
          if (actSig==='main') uf('mSig',img);
          else { var s=fd.sSigs.slice(); s[actSig]=img; uf('sSigs',s); }
        }}
        onClose={function(){setActSig(null);}}
      />}
      <div className="no-print" style={{maxWidth:700,margin:'0 auto'}}>
        <div style={{marginBottom:14}}><button onClick={props.onBack} style={{padding:'8px 14px',background:'white',border:'1px solid #e2e8f0',borderRadius:10,fontSize:13,fontWeight:700,color:'#64748b'}}>↩ العودة</button></div>
        <div style={{background:'white',borderRadius:24,boxShadow:'0 16px 48px rgba(128,42,93,.1)',overflow:'hidden'}}>
          <div style={{padding:'20px 24px 16px',borderBottom:'1px solid #f1f5f9'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
              <img src={LOGO} style={{height:42}} alt=""/>
              <div><p style={{margin:0,fontSize:11,fontWeight:800,color:B.o}}>مرحلة {step} من {T}</p><h2 style={{margin:0,fontSize:18,fontWeight:900,color:B.p}}>{sLabels[step-1]}</h2></div>
            </div>
            <div className="progress-bar">{Array.from({length:T},function(_,i){return <div key={i} className={i<step?'done':''}/>})}</div>
          </div>
          <div style={{padding:'20px 24px',minHeight:360}}>

            {step===1 && <div className="fade-in">
              <div style={{background:'#fffbeb',padding:16,borderRadius:16,marginBottom:20,maxHeight:280,overflowY:'auto',fontSize:14}}>
                <h3 style={{color:B.p,fontWeight:900,marginBottom:10}}>شروط فتح الحساب</h3>
                <ul style={{paddingRight:20,lineHeight:2}}><li>تعبئة الاستمارة والتوقيع.</li><li>إرفاق صورة الهوية.</li><li>التوقيع أمام الموظف.</li><li>الحساب للحوالات والمصارفة.</li><li>المسؤولية الكاملة عن البيانات.</li><li>يحق للمنشأة إغلاق الحساب عند المخالفة.</li></ul>
              </div>
              <label style={{display:'flex',alignItems:'center',gap:10,padding:14,background:fd.agree?B.l:'white',border:'2px solid '+(errs.agree?'#fca5a5':fd.agree?B.p:'#e2e8f0'),borderRadius:14,cursor:'pointer'}}>
                <input type="checkbox" checked={fd.agree} onChange={function(e){uf('agree',e.target.checked);}} style={{width:20,height:20,accentColor:B.p}}/>
                <span style={{fontSize:14,fontWeight:700}}>أقر بالموافقة على الشروط</span>
              </label>
              {errs.agree && <p style={{color:'#dc2626',fontSize:12,marginTop:6}}>⚠ {errs.agree}</p>}
            </div>}

            {step===2 && <div className="fade-in">
              <Fld label="نوع الحساب"><div style={{display:'flex',gap:10}}>
                {['شخصي','تجاري'].map(function(t){return <button key={t} onClick={function(){uf('acType',t);}} style={Object.assign({},chip(fd.acType===t),{flex:1,textAlign:'center',padding:12})}>{t==='شخصي'?'👤':'🏢'} {t}</button>;})}
              </div></Fld>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:8}}>
                {fd.names.map(function(n,i) {
                  if (i >= NC) return null;
                  return <Fld key={i} label={nLabels[i]||'اسم '+(i+1)} req={req('names')} err={errs['n_'+i]}><input style={inp(errs['n_'+i])} value={n} onChange={function(e){updName(i,e.target.value);}}/></Fld>;
                })}
                <Fld label="اللقب" req={req('nickname')} err={errs.nickname}><input style={inp(errs.nickname)} value={fd.nickname} onChange={function(e){uf('nickname',e.target.value);}}/></Fld>
              </div>
              {fd.acType==='تجاري' && <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:8}}>
                <Fld label="الاسم التجاري" req={req('businessName')} err={errs.bName}><input style={inp(errs.bName)} value={fd.bName} onChange={function(e){uf('bName',e.target.value);}}/></Fld>
                <Fld label="نوع النشاط"><input style={inp()} value={fd.bType} onChange={function(e){uf('bType',e.target.value);}}/></Fld>
                <Fld label="الشكل القانوني"><select style={inp()} value={fd.lForm} onChange={function(e){uf('lForm',e.target.value);}}><option value="">اختر</option>{(settings.legalForms||[]).map(function(f){return <option key={f}>{f}</option>;})}</select></Fld>
              </div>}
            </div>}

            {step===3 && <div className="fade-in" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <Fld label="نوع الهوية" req={req('idType')}><select style={inp()} value={fd.idType} onChange={function(e){uf('idType',e.target.value);uf('idNum','');uf('idExp','');}}>{Object.keys(settings.idRules||{}).map(function(t){return <option key={t}>{t}</option>;})}</select></Fld>
              <Fld label={'رقم الهوية ('+rule.digits+' رقم)'} req={req('idNumber')} err={errs.idNum} errMsg={errs.idNum}><input style={inp(errs.idNum)} value={fd.idNum} onChange={function(e){uf('idNum',e.target.value.replace(/\D/g,'').slice(0,rule.digits));}} maxLength={rule.digits}/><div style={{fontSize:10,color:fd.idNum.length===rule.digits?'#16a34a':'#94a3b8',marginTop:2}}>{fd.idNum.length}/{rule.digits}</div></Fld>
              <div style={{gridColumn:'span 2'}}><Fld label="تاريخ الإصدار" req={req('idIssueDate')} err={errs.idIssue} errMsg={errs.idIssue}><DatePicker value={fd.idIssue} onChange={function(v){uf('idIssue',v);}} err={errs.idIssue} minY={(settings.dateRanges||{}).issue?(settings.dateRanges.issue.min):2010} maxY={(settings.dateRanges||{}).issue?(settings.dateRanges.issue.max):2026}/></Fld></div>
              {fd.idExp && <div style={{gridColumn:'span 2'}}><Fld label={'تاريخ الانتهاء (تلقائي +'+rule.expYrs+' سنة)'}><div style={{padding:'10px 14px',background:'#f0fdf4',border:'1.5px solid #bbf7d0',borderRadius:12,fontSize:14,fontWeight:700,color:'#16a34a',textAlign:'center'}}>{new Date(fd.idExp).toLocaleDateString('ar-YE',{year:'numeric',month:'long',day:'numeric'})}</div></Fld></div>}
              <Fld label="مكان الإصدار" req={req('idIssuePlace')} err={errs.idPlace}><input style={inp(errs.idPlace)} value={fd.idPlace} onChange={function(e){uf('idPlace',e.target.value);}}/></Fld>
              <div/>
              <div style={{gridColumn:'span 2'}}><Fld label="تاريخ الميلاد" req={req('birthDate')} err={errs.bDate} errMsg={errs.bDate}><DatePicker value={fd.bDate} onChange={function(v){uf('bDate',v);}} err={errs.bDate} minY={(settings.dateRanges||{}).birth?(settings.dateRanges.birth.min):1950} maxY={(settings.dateRanges||{}).birth?(settings.dateRanges.birth.max):2012}/>{fd.bDate && /^\d{4}-\d{2}-\d{2}$/.test(fd.bDate) && <div style={{fontSize:11,color:calcAge(fd.bDate)<(settings.minAge||14)?'#dc2626':'#16a34a',marginTop:4,fontWeight:700}}>العمر: {calcAge(fd.bDate)} سنة</div>}</Fld></div>
            </div>}

            {step===4 && <div className="fade-in" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <Fld label="الدولة" req={req('country')} err={errs.country}><select style={inp(errs.country)} value={fd.country} onChange={function(e){uf('country',e.target.value);}}><option value="">اختر</option>{(settings.countries||[]).map(function(c){return <option key={c}>{c}</option>;})}</select></Fld>
              {hasGeo ? <React.Fragment>
                <Fld label="المحافظة" req={req('birthGov')} err={errs.gov}>
                  {provs.length>0 ? <select style={inp(errs.gov)} value={fd.gov} onChange={function(e){uf('gov',e.target.value);}}><option value="">اختر</option>{provs.map(function(p){return <option key={p}>{p}</option>;})}</select> : <input style={inp(errs.gov)} value={fd.gov} onChange={function(e){uf('gov',e.target.value);}} placeholder="اكتب المحافظة"/>}
                </Fld>
                {fd.gov && <Fld label="المديرية">
                  {dists.length>0 ? <select style={inp()} value={fd.dist} onChange={function(e){uf('dist',e.target.value);}}><option value="">اختر</option>{dists.map(function(d){return <option key={d}>{d}</option>;})}</select> : <input style={inp()} value={fd.dist} onChange={function(e){uf('dist',e.target.value);}} placeholder="اكتب المديرية"/>}
                </Fld>}
                <div style={{gridColumn:'span 2'}}><Fld label="العنوان التفصيلي"><input style={inp()} value={fd.addr} onChange={function(e){uf('addr',e.target.value);}} placeholder="الحي / الشارع"/></Fld></div>
              </React.Fragment> : <React.Fragment>

    var handle = function() {
      if (window.location.hash === '#admin') { setView('login'); setUser(null); }
      else { setView('client'); setUser(null); }
    };
    window.addEventListener('hashchange', handle);
    return function() { window.removeEventListener('hashchange', handle); };
  }, []);

  if (user) return React.createElement(AdminPanel, {user: user, onLogout: function() { setUser(null); setView('login'); }});
  if (view === 'login') return React.createElement(LoginScreen, {onLogin: setUser, onPublicForm: function() { setView('client'); }});
  return React.createElement(ClientForm, {onBack: function() { setView('login'); }});
};
ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
