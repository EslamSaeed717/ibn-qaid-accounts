const chip = (on) => ({padding:'8px 14px', borderRadius:10, border:`1.5px solid ${on?B.purple:'#e2e8f0'}`, background:on?B.purple:'white', color:on?'white':'#64748b', fontSize:13, fontWeight:700, cursor:'pointer'});

const Toast = ({msg, type, onClose}) => {
  useEffect(()=>{const t=setTimeout(onClose,4000);return()=>clearTimeout(t);},[]);
  const colors = {success:{bg:'#dcfce7',color:'#16a34a',icon:'✓'}, error:{bg:'#fef2f2',color:'#dc2626',icon:'✕'}, info:{bg:'#dbeafe',color:'#1d4ed8',icon:'ℹ'}};
  const c = colors[type] || colors.info;
  return <div className="toast" style={{background:c.bg,color:c.color}}><span style={{fontSize:16}}>{c.icon}</span>{msg}</div>;
};

// ============ منتقي التاريخ المحسن ============
const DatePicker = ({ value, onChange, err, minY, maxY }) => {
    const [day, setDay] = useState('');
    const [month, setMonth] = useState('');
    const [year, setYear] = useState('');

    useEffect(() => {
        if (value && /^\d{4}-\d{2}-\d{2}$/.test(value)) {
            const parts = value.split('-');
            setYear(parts[0]);
            setMonth(String(parseInt(parts[1])));
            setDay(String(parseInt(parts[2])));
        } else if (!value) {
            setDay(''); setMonth(''); setYear('');
        }
    }, [value]);

    const handlePartChange = (part, newValue) => {
        let newDay = day, newMonth = month, newYear = year;
        if (part === 'day') { setDay(newValue); newDay = newValue; }
        if (part === 'month') { setMonth(newValue); newMonth = newValue; }
        if (part === 'year') { setYear(newValue); newYear = newValue; }

        if (newYear && newMonth && newDay) {
            const daysInMonth = new Date(newYear, newMonth, 0).getDate();
            if (parseInt(newDay) <= daysInMonth) {
                onChange(`${newYear}-${String(newMonth).padStart(2, '0')}-${String(newDay).padStart(2, '0')}`);
            } else {
                setDay('');
            }
        }
    };

    const style = {width:'100%', padding:'10px', background:err?'#fef2f2':'#f8fafc', border:`1.5px solid ${err?'#fca5a5':'#e2e8f0'}`, borderRadius:8, outline:'none', fontSize:15};
    const years = []; for(let i = maxY; i >= minY; i--) years.push(i);
    const monthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
    const daysInSelectedMonth = year && month ? new Date(year, month, 0).getDate() : 31;
    const days = Array.from({ length: daysInSelectedMonth }, (_, i) => i + 1);

    return (
        <div>
            <div style={{display:'flex', gap:6}}>
                <select style={{...style, flex:1.2}} value={day} onChange={e => handlePartChange('day', e.target.value)}>
                    <option value="">اليوم</option>
                    {days.map(d => <option key={d} value={d}>{d}</option>)}
                </select>
                <select style={{...style, flex:1.5}} value={month} onChange={e => handlePartChange('month', e.target.value)}>
                    <option value="">الشهر</option>
                    {monthNames.map((name, i) => <option key={i+1} value={i+1}>{name}</option>)}
                </select>
                <select style={{...style, flex:1.5}} value={year} onChange={e => handlePartChange('year', e.target.value)}>
                    <option value="">السنة</option>
                    {years.map(yr => <option key={yr} value={yr}>{yr}</option>)}
                </select>
            </div>
            {value && /^\d{4}-\d{2}-\d{2}$/.test(value) && 
                <div style={{marginTop:8, fontSize:14, fontWeight:700, color:B.purple, background:'#f0fdf4', padding:'8px 12px', borderRadius:8, textAlign:'center'}}>
                    التاريخ المحدد: {new Date(value).toLocaleDateString('ar-YE', {year:'numeric', month:'long', day:'numeric'})}
                </div>
            }
        </div>
    );
};

// ============ نافذة التوقيع ============
const SignatureModal = ({ label, onSave, onClose, init }) => {
  const ref = useRef(null); const [dr, setDr] = useState(false); const [has, setHas] = useState(!!init);
  
  useEffect(() => {
    const canvas = ref.current; canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight;
    const ctx = canvas.getContext('2d'); ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = B.purple;
    if(init){const img = new Image(); img.onload = () => ctx.drawImage(img,0,0, canvas.width, canvas.height); img.src = init; setHas(true);}
  }, []);

  const gp = (e) => {const c=ref.current, r=c.getBoundingClientRect(); const cx=e.clientX??(e.touches?.[0]?.clientX); const cy=e.clientY??(e.touches?.[0]?.clientY); return {x:cx-r.left, y:cy-r.top};};
  const st = (e) => {e.preventDefault(); const p=gp(e); ref.current.getContext('2d').beginPath(); ref.current.getContext('2d').moveTo(p.x, p.y); setDr(true);};
  const mv = (e) => {e.preventDefault(); if(!dr) return; const p=gp(e); const ctx=ref.current.getContext('2d'); ctx.lineTo(p.x, p.y); ctx.stroke(); setHas(true);};
  const en = () => {if(dr) setDr(false);};
  const cl = () => {ref.current.getContext('2d').clearRect(0,0,ref.current.width,ref.current.height); setHas(false);};
  
  return (
    <div className="modal-overlay">
      <div className="modal-content slide-up" style={{display:'flex', flexDirection:'column', height:'80vh', maxHeight:'500px'}}>
        <div style={{background:B.purple, color:'white', padding:'16px 20px', display:'flex', justifyContent:'space-between', alignItems:'center'}}><h3 style={{margin:0, fontSize:18, fontWeight:800}}>لوحة التوقيع: {label}</h3><button onClick={onClose} style={{background:'none', border:'none', color:'white', fontSize:24}}>&times;</button></div>
        <div style={{flex:1, background:'#f8fafc', position:'relative', cursor:'crosshair'}}>
          {!has && <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', pointerEvents:'none', color:'#cbd5e1', fontSize:32, fontWeight:900, opacity:0.5}}>وقّع هنا في المساحة الفارغة</div>}
          <canvas ref={ref} style={{width:'100%', height:'100%', touchAction:'none'}} onMouseDown={st} onMouseMove={mv} onMouseUp={en} onMouseLeave={en} onTouchStart={st} onTouchMove={mv} onTouchEnd={en}/>
        </div>
        <div style={{padding:'16px', display:'flex', gap:'12px', background:'white', borderTop:'1px solid #e2e8f0'}}>
          <button onClick={cl} style={{flex:1, padding:'14px', background:'#fef2f2', color:'#dc2626', border:'none', borderRadius:'12px', fontSize:16, fontWeight:800}}>🔄 إعادة المحاولة</button>
          <button onClick={()=>{if(has) onSave(ref.current.toDataURL()); onClose();}} disabled={!has} style={{flex:2, padding:'14px', background:has?B.purple:'#cbd5e1', color:'white', border:'none', borderRadius:'12px', fontSize:16, fontWeight:800}}>✅ حفظ التوقيع</button>
        </div>
      </div>
    </div>
  );
};

const ClientForm = ({onBack}) => {
  const settings = DB.get('settings');
  const reqFields = settings.requiredFields || [];
  const [step, setStep] = useState(1); const T = 7;
  const [errs, setErrs] = useState({}); const [toast, setToast] = useState(null);
  const [submitted, setSubmitted] = useState(false); const [subData, setSubData] = useState(null);
  const [activeSig, setActiveSig] = useState(null);

  const [fd, setFd] = useState({
    accountType: 'شخصي', names: Array(settings.nameFieldCount).fill(''), nickname: '',
    businessName: '', businessType: '', legalForm: '',
    idType: Object.keys(settings.idRules)[0], idNumber: '', idIssueDate: '', idExpiry: '', idIssuePlace: '',
    birthDate: '', country: 'اليمن', birthGov: '', birthDistrict: '', address: '', 
    mobileType: 'yemeni', mobile: '', countryCode: '+967', phone: '', email: '', branch: '',
    currencies: [], services: [], authorized: [{name:'', id:'', phone:'', permissions:[], signature:null}],
    sampleSignatures: [null, null, null], mainSignature: null, idPhotos: {}, termsAccepted: false
  });

  const uf = (f, v) => setFd(p => ({...p, [f]: v}));
  const updateName = (i, v) => { const n = [...fd.names]; n[i] = v; uf('names', n); };
  const addNameField = () => { if(fd.names.length < 6) uf('names', [...fd.names, '']); };
  const idRule = settings.idRules[fd.idType];
  const currentYear = new Date().getFullYear();

  useEffect(() => {
    if(fd.idIssueDate && !fd.idIssueDate.includes('--') && idRule) {
      uf('idExpiry', addYears(fd.idIssueDate, idRule.expiryYears));
    }
  }, [fd.idIssueDate, fd.idType]);

  const req = (field) => reqFields.includes(field);

  const validate = (checkStep) => {
    const e = {};
    if(checkStep === 1 && !fd.termsAccepted) e.terms = 'يجب الموافقة';
    if(checkStep === 2) {
      if(req('names')) fd.names.forEach((n, i) => { if(i < settings.nameFieldCount && !n.trim()) e[`name_${i}`] = 'مطلوب'; });
      if(req('nickname') && !fd.nickname.trim()) e.nickname = 'مطلوب';
      if(fd.accountType === 'تجاري') {
        if(req('businessName') && !fd.businessName) e.businessName = 'مطلوب'; 
        if(req('businessType') && !fd.businessType) e.businessType = 'مطلوب'; 
        if(req('legalForm') && !fd.legalForm) e.legalForm = 'مطلوب';
      }
    }
    if(checkStep === 3) {
      if(req('idNumber') && !fd.idNumber) e.idNumber = 'مطلوب';
      else if(fd.idNumber && idRule && fd.idNumber.length !== idRule.digits) e.idNumber = `يجب أن يكون ${idRule.digits} رقم`;
      if(req('idIssueDate') && (!fd.idIssueDate || !/^\d{4}-\d{2}-\d{2}$/.test(fd.idIssueDate))) e.idIssueDate = 'تاريخ غير مكتمل';
      if(req('idIssuePlace') && !fd.idIssuePlace) e.idIssuePlace = 'مطلوب';
      if(req('birthDate') && (!fd.birthDate || !/^\d{4}-\d{2}-\d{2}$/.test(fd.birthDate))) e.birthDate = 'تاريخ غير مكتمل';
    }
    if(checkStep === 4) { 
      if(req('country') && !fd.country) e.country = 'مطلوب';
      if(fd.country && worldGeoData[fd.country]) {
          if(req('birthGov') && !fd.birthGov) e.birthGov = 'مطلوب';
      }
      if(req('address') && !fd.address) e.address = 'مطلوب';
      if(req('mobile') && !fd.mobile) e.mobile = 'مطلوب';
      if(fd.mobileType === 'yemeni' && fd.mobile) {
        if(!/^(77|71|70|73|78)\d{7}$/.test(fd.mobile)) e.mobile = 'رقم يمني غير صالح (9 أرقام)';
      }
      if(req('branch') && !fd.branch) e.branch = 'مطلوب'; 
    }
    if(checkStep === 5) {
        if(req('currencies') && fd.currencies.length === 0) e.currencies = 'مطلوب عملة واحدة على الأقل';
    }
    if(checkStep === 6) {
        if (fd.sampleSignatures.some(s => !s)) e.sampleSignatures = 'يجب إكمال جميع نماذج التوقيعات الثلاثة';
        if (!fd.mainSignature) e.mainSignature = 'التوقيع الرئيسي للإقرار إلزامي';
    }
    if(checkStep === 7 && req('photos')) {
        const requiredPhotos = getPhotoConfig();
        if(requiredPhotos.some(p => !fd.idPhotos[p.id])) e.photos = 'الرجاء إرفاق جميع صور الوثائق';
    }
    return e;
  };

  const nx = () => { 
    const stepErrors = validate(step);
    if (Object.keys(stepErrors).length === 0) {
      setStep(s => Math.min(s+1, T));
    } else {
      setErrs(stepErrors);
      setToast({msg:'يرجى إكمال الحقول الإلزامية بدقة', type:'error'});
    }
  };

  const submitForm = () => {
    const allErrors = {};
    for (let i = 1; i <= T; i++) {
        Object.assign(allErrors, validate(i));
    }
    if (Object.keys(allErrors).length > 0) {
        setErrs(allErrors);
        setToast({msg:'هناك حقول إلزامية ناقصة. يرجى المراجعة.', type:'error'});
        return;
    }
    const fullName = [...fd.names, fd.nickname].filter(Boolean).join(' ');
    const subs = DB.get('submissions') || [];
    const count = subs.filter(s => s.id.startsWith(currentYear.toString())).length + 1;
    const finalId = `${currentYear}-${count.toString().padStart(4, '0')}`;
    const finalMobile = fd.mobileType === 'yemeni' ? '+967' + fd.mobile : fd.countryCode + fd.mobile;
    const submission = {...fd, fullName, mobile: finalMobile, id: finalId, status: 'pending', submittedAt: isoDate()};
    DB.set('submissions', [...subs, submission]);
    setSubData(submission); 
    setSubmitted(true);
  };

  const getPhotoConfig = () => {
    if(fd.idType.includes('شخصية')) return [{id:'front', label:'الوجه الأمامي'}, {id:'back', label:'الوجه الخلفي'}];
    if(fd.idType.includes('جواز')) return [{id:'passport', label:'صورة صفحة البيانات'}];
    return [{id:'main', label:'صورة الهوية'}];
  };

  const handlePhoto = (id, file) => {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => setFd(p => ({...p, idPhotos: {...p.idPhotos, [id]: e.target.result}}));
    reader.readAsDataURL(file);
  };

  const SigBox = ({id, label, val}) => (
    <div onClick={()=>setActiveSig(id)} style={{border:`2px dashed ${val?B.purple:'#cbd5e1'}`, borderRadius:12, padding:14, background:'#f8fafc', textAlign:'center', cursor:'pointer', minHeight:100, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center'}}>
      {val ? <img src={val} style={{maxHeight:70, maxWidth:'100%'}} alt=""/> : <div style={{color:'#94a3b8', fontSize:13, fontWeight:700}}><i className="fas fa-pen-nib" style={{fontSize:20, display:'block', marginBottom:8}}/>اضغط هنا للتوقيع<br/>{label}</div>}
    </div>
  );

  if(submitted) return (
    <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#f1f5f9', padding:16}}>
      <div className="slide-up" style={{textAlign:'center', background:'white', padding:'40px 20px', borderRadius:24, boxShadow:'0 10px 30px rgba(0,0,0,0.1)', maxWidth:500, width:'100%'}}>
        <div style={{width:80, height:80, borderRadius:'50%', background:'#dcfce7', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 20px', fontSize:40}}>✅</div>
        <h2 style={{color:B.purple, fontWeight:900, marginBottom:10}}>تم تقديم الطلب بنجاح!</h2>
        <p style={{color:'#64748b', fontSize:15, lineHeight:1.8}}>رقم طلبك المرجعي: <strong>{subData.id}</strong></p>
        <button onClick={onBack} style={{marginTop:20, padding:'12px 30px', background:B.purple, color:'white', border:'none', borderRadius:12, fontSize:14, fontWeight:800}}>العودة للرئيسية</button>
      </div>
    </div>
  );

  const labels = ['الشروط','البيانات الأساسية','الهوية والتواريخ','العنوان والتواصل','العملات والخدمات','التوقيعات','إرفاق الوثائق'];

  return (
    <div style={{minHeight:'100vh', background:'#f1f5f9', padding:'16px 10px'}}>
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
      {activeSig !== null && <SignatureModal 
          label={activeSig === 'main' ? 'التوقيع الرئيسي' : `نموذج ${activeSig + 1}`} 
          init={activeSig === 'main' ? fd.mainSignature : fd.sampleSignatures[activeSig]} 
          onSave={img => {
              if (activeSig === 'main') uf('mainSignature', img);
              else { const s = [...fd.sampleSignatures]; s[activeSig] = img; uf('sampleSignatures', s); }
          }} 
          onClose={() => setActiveSig(null)}
      />}

      <div className="no-print" style={{maxWidth:700, margin:'0 auto'}}>
        <div style={{marginBottom:14}}><button onClick={onBack} style={{padding:'8px 14px', background:'white', border:'1px solid #e2e8f0', borderRadius:10, fontSize:13, fontWeight:700, color:'#64748b'}}>↩ العودة</button></div>
        <div style={{background:'white', borderRadius:24, boxShadow:'0 16px 48px rgba(128,42,93,0.1)', overflow:'hidden'}}>
          <div style={{padding:'20px 24px 16px', borderBottom:'1px solid #f1f5f9'}}>
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:12}}><img src={LOGO} style={{height:42}} alt=""/><div><p style={{margin:0, fontSize:11, fontWeight:800, color:B.orange}}>مرحلة {step} من {T}</p><h2 style={{margin:0, fontSize:18, fontWeight:900, color:B.purple}}>{labels[step-1]}</h2></div></div>
            <div style={{display:'flex', gap:4}}>{Array.from({length:T},(_,i)=><div key={i} style={{flex:1, height:4, borderRadius:2, background:i<step?B.purple:'#e2e8f0'}}/>)}</div>
          </div>

          <div style={{padding:'20px 24px', minHeight:400}}>
            {step===1 && <div className="fade-in">
              <div style={{background:'#fffbeb', padding:16, borderRadius:16, marginBottom:20, maxHeight:300, overflowY:'auto', fontSize:14}}>
                <h3 style={{color:B.purple, fontWeight:900, marginBottom:10}}>شروط فتح الحساب</h3>
                <ul><li>تعبئة الاستمارة والتوقيع عليها.</li><li>إرفاق صورة الهوية سارية المفعول.</li><li>التوقيع أمام الموظف المختص.</li><li>الالتزام بالشروط والأحكام.</li></ul>
              </div>
              <label style={{display:'flex', alignItems:'center', gap:10, padding:14, background:fd.termsAccepted?'#f8f0f5':'white', border:`2px solid ${errs.terms?'#fca5a5':fd.termsAccepted?B.purple:'#e2e8f0'}`, borderRadius:14, cursor:'pointer'}}>
                <input type="checkbox" checked={fd.termsAccepted} onChange={e=>uf('termsAccepted',e.target.checked)} style={{width:20, height:20, accentColor:B.purple}}/>
                <span style={{fontSize:15, fontWeight:800}}>أقر بالموافقة على الشروط</span>
              </label>
            </div>}

            {step===2 && <div className="fade-in">
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
                <div style={{gridColumn:'span 2', display:'flex', justifyContent:'space-between'}}>
                  <h4 style={{fontSize:16, fontWeight:800, color:B.purple}}>الاسم الشخصي</h4>
                  <button type="button" onClick={addNameField} style={{background:'none', border:`1px dashed ${B.purple}`, color:B.purple, borderRadius:30, padding:'4px 14px', fontSize:13, fontWeight:700}}>+ إضافة اسم</button>
                </div>
                {fd.names.map((n, i) => (
                  <Fld key={i} label={`الاسم ${i+1}`} req={req('names') && i < settings.nameFieldCount} err={errs[`name_${i}`]}>
                    <input style={inp(errs[`name_${i}`])} value={n} onChange={e=>updateName(i, e.target.value)} placeholder={`الاسم ${i+1}`}/>
                  </Fld>
                ))}
                <Fld label="اللقب العائلي" req={req('nickname')} err={errs.nickname}><input style={inp(errs.nickname)} value={fd.nickname} onChange={e=>uf('nickname', e.target.value)} placeholder="اللقب"/></Fld>
              </div>
            </div>}

            {step===3 && <div className="fade-in">
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
                <Fld label="نوع الهوية" req={req('idType')}><select style={inp()} value={fd.idType} onChange={e=>{uf('idType',e.target.value); uf('idNumber',''); uf('idPhotos',{});}}>{Object.keys(settings.idRules).map(t=><option key={t}>{t}</option>)}</select></Fld>
                <Fld label={`رقم الهوية (${idRule.digits} رقم)`} req={req('idNumber')} err={errs.idNumber}><input style={{...inp(errs.idNumber), fontFamily:'monospace', fontWeight:700}} value={fd.idNumber} onChange={e=>uf('idNumber', e.target.value.replace(/\D/g,'').slice(0,idRule.digits))} placeholder={'0'.repeat(idRule.digits)}/></Fld>
                <div style={{gridColumn:'span 2'}}><Fld label="تاريخ الإصدار" req={req('idIssueDate')} err={errs.idIssueDate}><DatePicker value={fd.idIssueDate} onChange={v=>uf('idIssueDate', v)} err={errs.idIssueDate} minY={settings.dateRanges.issueDate.min} maxY={settings.dateRanges.issueDate.max}/></Fld></div>
                <Fld label="تاريخ الانتهاء"><div style={{...inp(), background:'#f0fdf4'}}>{fd.idExpiry || '—'}</div></Fld>
                <Fld label="مكان الإصدار" req={req('idIssuePlace')} err={errs.idIssuePlace}><select style={inp(errs.idIssuePlace)} value={fd.idIssuePlace} onChange={e=>uf('idIssuePlace', e.target.value)}><option value="">اختر</option>{Object.keys(worldGeoData['اليمن'] || {}).map(p=><option key={p}>{p}</option>)}</select></Fld>
                <div style={{gridColumn:'span 2'}}><Fld label="تاريخ الميلاد" req={req('birthDate')} err={errs.birthDate}><DatePicker value={fd.birthDate} onChange={v=>uf('birthDate', v)} err={errs.birthDate} minY={settings.dateRanges.birthDate.min} maxY={settings.dateRanges.birthDate.max}/></Fld></div>
              </div>
            </div>}

            {step===4 && <div className="fade-in">
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
                <div style={{gridColumn:'span 2'}}><Fld label="الدولة" req={req('country')}><select style={inp()} value={fd.country} onChange={e=>{uf('country', e.target.value); uf('birthGov',''); uf('birthDistrict',''); uf('address','');}}><option value="">اختر</option>{Object.keys(worldGeoData).map(c=><option key={c}>{c}</option>)}</select></Fld></div>
                
                {fd.country && worldGeoData[fd.country] ? (
                  <>
                    <Fld label="المحافظة / الولاية" req={req('birthGov')} err={errs.birthGov}>
                      <select style={inp(errs.birthGov)} value={fd.birthGov} onChange={e => { uf('birthGov', e.target.value); uf('birthDistrict', ''); uf('address', ''); }}>
                        <option value="">اختر</option>
                        {Object.keys(worldGeoData[fd.country]).map(g => <option key={g} value={g}>{g}</option>)}
                      </select>
                    </Fld>
                    <Fld label="المديرية / المقاطعة" req={req('birthDistrict')} err={errs.birthDistrict}>
                      <select style={inp(errs.birthDistrict)} value={fd.birthDistrict} onChange={e => { uf('birthDistrict', e.target.value); uf('address', ''); }} disabled={!fd.birthGov}>
                        <option value="">اختر</option>
                        {fd.birthGov && worldGeoData[fd.country][fd.birthGov] ? Object.keys(worldGeoData[fd.country][fd.birthGov]).map(d => <option key={d} value={d}>{d}</option>) : null}
                      </select>
                    </Fld>
                    <div style={{gridColumn:'span 2'}}>
                      <Fld label="المنطقة / الحي" req={req('address')} err={errs.address}>
                        <select style={inp(errs.address)} value={fd.address} onChange={e => uf('address', e.target.value)} disabled={!fd.birthDistrict}>
                          <option value="">اختر</option>
                          {fd.birthGov && fd.birthDistrict && worldGeoData[fd.country][fd.birthGov][fd.birthDistrict] ? worldGeoData[fd.country][fd.birthGov][fd.birthDistrict].map(r => <option key={r} value={r}>{r}</option>) : null}
                        </select>
                      </Fld>
                    </div>
                  </>
                ) : (
                  <div style={{gridColumn:'span 2'}}><Fld label="العنوان التفصيلي" req={req('address')}><input style={inp()} value={fd.address} onChange={e=>uf('address', e.target.value)} placeholder="أدخل العنوان"/></Fld></div>
                )}
                
                <div style={{gridColumn:'span 2', marginTop:10}}>
                  <Fld label="نوع الجوال"><div style={{display:'flex', gap:10}}>
                    <label style={{flex:1, padding:10, background:fd.mobileType==='yemeni'?B.light:'#f8fafc', border:`1px solid ${fd.mobileType==='yemeni'?B.purple:'#e2e8f0'}`, borderRadius:8, textAlign:'center', cursor:'pointer'}}><input type="radio" checked={fd.mobileType==='yemeni'} onChange={()=>uf('mobileType','yemeni')} style={{display:'none'}}/> يمني</label>
                    <label style={{flex:1, padding:10, background:fd.mobileType==='intl'?B.light:'#f8fafc', border:`1px solid ${fd.mobileType==='intl'?B.purple:'#e2e8f0'}`, borderRadius:8, textAlign:'center', cursor:'pointer'}}><input type="radio" checked={fd.mobileType==='intl'} onChange={()=>uf('mobileType','intl')} style={{display:'none'}}/> دولي</label>
                  </div></Fld>
                  <Fld label="رقم الجوال" req={req('mobile')} err={errs.mobile}>
                    <div style={{display:'flex', direction:'ltr', gap:5}}>
                      {fd.mobileType === 'yemeni' ? <div style={{padding:'11px 16px', background:'#e2e8f0', borderRadius:'12px 0 0 12px'}}>+967</div> :
                        <select style={{...inp(), width:120, borderRadius:'12px 0 0 12px'}} value={fd.countryCode} onChange={e=>uf('countryCode', e.target.value)}>
                          {countryCodes.map(c => <option key={c.code} value={c.code}>{c.name} ({c.code})</option>)}
                        </select>
                      }
                      <input style={{...inp(errs.mobile), borderRadius:'0 12px 12px 0', flex:1}} value={fd.mobile} onChange={e=>uf('mobile', e.target.value.replace(/[^\d]/g,''))} placeholder="رقم الجوال"/>
                    </div>
                  </Fld>
                </div>
                <Fld label="الهاتف الثابت"><input style={inp()} value={fd.phone} onChange={e=>uf('phone', e.target.value)}/></Fld>
                <Fld label="البريد الإلكتروني"><input style={inp()} value={fd.email} onChange={e=>uf('email', e.target.value)}/></Fld>
                <div style={{gridColumn:'span 2'}}><Fld label="الفرع" req={req('branch')}><select style={inp()} value={fd.branch} onChange={e=>uf('branch', e.target.value)}><option value="">اختر</option>{settings.branches.map(b=><option key={b}>{b}</option>)}</select></Fld></div>
              </div>
            </div>}

            {step===5 && <div className="fade-in">
              <Fld label="العملات المطلوبة" req={req('currencies')}><div style={{display:'flex', flexWrap:'wrap', gap:8}}>{settings.currencies.map(c=><button key={c} onClick={()=>{const n = fd.currencies.includes(c) ? fd.currencies.filter(x=>x!==c) : [...fd.currencies, c]; uf('currencies', n);}} style={chip(fd.currencies.includes(c))}>{c}</button>)}</div></Fld>
              <div style={{height:20}}/>
              <Fld label="وسائل الخدمة"><div style={{display:'flex', flexWrap:'wrap', gap:8}}>{settings.services.map(s=><button key={s} onClick={()=>{const n = fd.services.includes(s) ? fd.services.filter(x=>x!==s) : [...fd.services, s]; uf('services', n);}} style={chip(fd.services.includes(s))}>{s}</button>)}</div></Fld>
            </div>}

            {step===6 && <div className="fade-in">
              <div style={{marginBottom:20}}>
                <h4 style={{fontSize:16, fontWeight:800, color:B.purple, marginBottom:10}}>نماذج التوقيعات الفرعية <span style={{color:'#dc2626'}}>*</span></h4>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8}}>
                  {[0,1,2].map(i => <SigBox key={i} id={i} label={`نموذج ${i+1}`} val={fd.sampleSignatures[i]}/>)}
                </div>
                {errs.sampleSignatures && <p style={{color:'#dc2626', fontSize:13, marginTop:8}}>⚠ {errs.sampleSignatures}</p>}
              </div>
              <h4 style={{fontSize:16, fontWeight:900, color:B.purple, marginBottom:10}}>التوقيع الرئيسي <span style={{color:'#dc2626'}}>*</span></h4>
              <SigBox id="main" label="اضغط للتوقيع" val={fd.mainSignature}/>
              {errs.mainSignature && <p style={{color:'#dc2626', fontSize:13, marginTop:8}}>⚠ {errs.mainSignature}</p>}
            </div>}

            {step===7 && <div className="fade-in">
              <h4 style={{fontSize:16, fontWeight:800, color:B.purple, marginBottom:16}}>المرفقات ({fd.idType})</h4>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
                {getPhotoConfig().map(conf => (
                  <div key={conf.id} style={{border:`2px dashed ${fd.idPhotos[conf.id]?'#16a34a':'#cbd5e1'}`, borderRadius:16, padding:14, textAlign:'center'}}>
                    {fd.idPhotos[conf.id] ? <><img src={fd.idPhotos[conf.id]} style={{width:'100%', height:120, objectFit:'contain'}} alt=""/><button onClick={()=>{const n={...fd.idPhotos}; delete n[conf.id]; uf('idPhotos', n);}} style={{marginTop:8, padding:'6px 14px', background:'#fef2f2', color:'#dc2626', border:'none', borderRadius:8}}>إزالة</button></> :
                      <div><i className="fas fa-id-card" style={{fontSize:32, color:'#94a3b8'}}/><p>{conf.label}</p><label style={{padding:'8px 16px', background:B.purple, color:'white', borderRadius:8, cursor:'pointer'}}>رفع<input type="file" accept="image/*" onChange={e=>handlePhoto(conf.id, e.target.files[0])} style={{display:'none'}}/></label></div>
                    }
                  </div>
                ))}
              </div>
              {errs.photos && <p style={{color:'#dc2626', marginTop:10}}>⚠ {errs.photos}</p>}
              <button onClick={submitForm} style={{width:'100%', marginTop:20, padding:16, background:'#16a34a', color:'white', border:'none', borderRadius:12, fontSize:17, fontWeight:900}}>🚀 تأكيد الطلب</button>
            </div>}
          </div>

          {step < T && <div style={{padding:'12px 24px 20px', display:'flex', gap:10}}>
            {step > 1 && <button onClick={()=>setStep(s=>s-1)} style={{padding:'12px 16px', background:'#f1f5f9', color:'#64748b', border:'none', borderRadius:12}}>→ السابق</button>}
            <button onClick={nx} style={{flex:1, padding:14, background:B.purple, color:'white', border:'none', borderRadius:12, fontSize:15, fontWeight:900}}>{step===6 ? 'مراجعة المرفقات ←' : 'التالي ←'}</button>
          </div>}
        </div>
      </div>
    </div>
  );
};

// ============ مكون PDF (مختصر) ============
const PDFDoc = ({f, op}) => {
  const WM = () => <div className="watermark-container"><img src={LOGO} alt="" className="watermark-img"/></div>;
  return (
    <div id="pdf-output" style={{display:'flex', flexDirection:'column', alignItems:'center', background:'#444', padding:20, gap:20}}>
      <div className="page-a4"><WM/><div className="content-wrapper" style={{padding:'10mm'}}>
        <div className="cover-header"><img src={LOGO} style={{height:100}}/><h1>ابن قايد المريسي</h1></div>
        <div className="file-label">ملف حساب {f.fullName}</div>
        <div><strong>الفرع:</strong> {f.branch} | <strong>الجوال:</strong> {f.mobile}</div>
        <div className="designer-mark">Eslam Saeed</div>
      </div></div>
    </div>
  );
};

// ============ التطبيق الرئيسي ============
const App = () => {
  const [user, setUser] = useState(null);
  const [showClientForm, setShowClientForm] = useState(false);
  if(showClientForm) return <ClientForm onBack={()=>setShowClientForm(false)}/>;
  if(user) return <AdminPanel user={user} onLogout={()=>setUser(null)}/>;
  return <LoginScreen onLogin={setUser} onPublicForm={()=>setShowClientForm(true)}/>;
};
ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
