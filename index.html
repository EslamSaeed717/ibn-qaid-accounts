var findLocalAnswer = function(q) {
  var ql = q.toLowerCase().trim();
  for(var i=0; i<LOCAL_QA.length; i++) {
    for(var j=0; j<LOCAL_QA[i].q.length; j++) {
      if(ql.indexOf(LOCAL_QA[i].q[j]) >= 0) return LOCAL_QA[i].a;
    }
  }
  return 'أنا هنا لمساعدتك في فتح حسابك. يمكنك سؤالي عن:\n• خطوات فتح الحساب\n• أنواع الهويات المطلوبة\n• كيفية التوقيع\n• رفع المرفقات\n• الفروع والعملات\nاكتب سؤالك وسأساعدك!';
};

var askAI = function(systemPrompt, userMessage, callback) {
  // Try API first
  var tryModel = function(idx) {
    if(idx >= AI_MODELS.length) {
      // All API models failed — use local fallback
      callback(findLocalAnswer(userMessage));
      return;
    }
    var url = 'https://generativelanguage.googleapis.com/v1beta/models/'+AI_MODELS[idx]+':generateContent?key='+AI_KEY;
    fetch(url, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        system_instruction: { parts: [{ text: systemPrompt }] },
        contents: [{ parts: [{ text: userMessage }] }],
        generationConfig: { maxOutputTokens: 500, temperature: 0.3 }
      })
    }).then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    }).then(function(d){
      if(d.error) { tryModel(idx+1); return; }
      var text = d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts && d.candidates[0].content.parts[0] && d.candidates[0].content.parts[0].text;
      if(text) callback(text); else tryModel(idx+1);
    }).catch(function(){ tryModel(idx+1); });
  };
  tryModel(0);
};

          <div className="settings-section"><div className="settings-title">📋 الحقول الإلزامية</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>{['names','nickname','idNumber','idIssueDate','idIssuePlace','birthDate','country','birthGov','mobile','branch','currencies','mainSignature','sampleSignatures','photos'].map(function(f){var labels={names:'الاسم',nickname:'اللقب',idNumber:'رقم الهوية',idIssueDate:'تاريخ الإصدار',idIssuePlace:'مكان الإصدار',birthDate:'الميلاد',country:'الدولة',birthGov:'المحافظة',mobile:'الجوال',branch:'الفرع',currencies:'العملات',mainSignature:'التوقيع',sampleSignatures:'نماذج التوقيع',photos:'صور الهوية'};return <label key={f} style={{display:'flex',alignItems:'center',gap:6,padding:8,background:(settings.requiredFields||[]).indexOf(f)>=0?'#f0fdf4':'#f8fafc',borderRadius:8,border:'1px solid '+((settings.requiredFields||[]).indexOf(f)>=0?'#bbf7d0':'#e2e8f0'),cursor:'pointer',fontSize:12}}><input type="checkbox" checked={(settings.requiredFields||[]).indexOf(f)>=0} onChange={function(){var rf=(settings.requiredFields||[]).slice();var idx=rf.indexOf(f);if(idx>=0)rf.splice(idx,1);else rf.push(f);saveSetting('requiredFields',rf);}} style={{accentColor:B.purple}}/>{labels[f]||f}</label>;})}</div></div>
          <div className="settings-section"><div className="settings-title">🔢 قواعد الهويات</div>{Object.entries(settings.idRules||{}).map(function(kv){return <div key={kv[0]} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,fontSize:12,flexWrap:'wrap'}}><strong style={{minWidth:100}}>{kv[0]}:</strong>أرقام:<input type="number" style={Object.assign({},inp(),{width:60,padding:6,fontSize:12})} value={kv[1].digits} onChange={function(e){var r=Object.assign({},settings.idRules);r[kv[0]]=Object.assign({},kv[1],{digits:parseInt(e.target.value)||0});saveSetting('idRules',r);}}/> سنوات:<input type="number" style={Object.assign({},inp(),{width:60,padding:6,fontSize:12})} value={kv[1].expiryYears} onChange={function(e){var r=Object.assign({},settings.idRules);r[kv[0]]=Object.assign({},kv[1],{expiryYears:parseInt(e.target.value)||0});saveSetting('idRules',r);}}/></div>;})}</div>
          {[['branches','🏢 الفروع'],['currencies','💰 العملات'],['services','📡 الخدمات']].map(function(pair){var field=pair[0],title=pair[1];return <div key={field} className="settings-section"><div className="settings-title">{title}</div>{(settings[field]||[]).map(function(item,i){return <div key={i} style={{display:'flex',gap:6,marginBottom:4}}><input style={Object.assign({},inp(),{fontSize:12,padding:6})} value={item} onChange={function(e){var items=(settings[field]||[]).slice();items[i]=e.target.value;saveSetting(field,items);}}/><button onClick={function(){var items=(settings[field]||[]).slice();items.splice(i,1);saveSetting(field,items);}} style={{padding:'4px 10px',background:'#fef2f2',color:'#dc2626',border:'none',borderRadius:6,fontSize:12}}>✕</button></div>;})}<div style={{display:'flex',gap:6,marginTop:6}}><input id={'new-'+field} style={Object.assign({},inp(),{fontSize:12,padding:6})} placeholder="جديد..." onKeyDown={function(e){if(e.key==='Enter'&&e.target.value.trim()){saveSetting(field,(settings[field]||[]).concat([e.target.value.trim()]));e.target.value='';}}} /><button onClick={function(){var el=document.getElementById('new-'+field);if(el&&el.value.trim()){saveSetting(field,(settings[field]||[]).concat([el.value.trim()]));el.value='';}}} style={{padding:'6px 12px',background:B.purple,color:'white',border:'none',borderRadius:6,fontSize:12,fontWeight:700}}>+</button></div></div>;})}

/* ===== CLIENT FORM ===== */
var ClientForm=function(p){
  var settings=SDB.getSettingsSync();var reqFields=settings.requiredFields||[];
  var _step=useState(1),step=_step[0],setStep=_step[1];var T=7;
  var _errs=useState({}),errs=_errs[0],setErrs=_errs[1];
  var _toast=useState(null),toast=_toast[0],setToast=_toast[1];
  var _sub=useState(false),submitted=_sub[0],setSubmitted=_sub[1];
  var _subD=useState(null),subData=_subD[0],setSubData=_subD[1];
  var _sig=useState(null),activeSig=_sig[0],setActiveSig=_sig[1];
  var _shake=useState(false),shakeBtn=_shake[0],setShakeBtn=_shake[1];
  var _survey=useState(false),showSurvey=_survey[0],setShowSurvey=_survey[1];
  var _surveyDone=useState(false),surveyDone=_surveyDone[0],setSurveyDone=_surveyDone[1];
  var _surveyData=useState({how:'',rating:0,suggestions:''}),surveyData=_surveyData[0],setSurveyData=_surveyData[1];
  var _sending=useState(false),sending=_sending[0],setSending=_sending[1];
  var _showExtra=useState(false),showExtraName=_showExtra[0],setShowExtraName=_showExtra[1];

  var nameLabels=['الاسم الأول','اسم الأب','اسم الجد'];
  var stepLabels=['الشروط','البيانات','الهوية','العنوان','العملات','التوقيعات','المرفقات'];

  // Load draft from localStorage
  var _fd=useState(function(){
    try{var d=JSON.parse(localStorage.getItem('iq4_draft'));if(d)return d;}catch(e){}
    return{
      accountType:'شخصي',names:['','',''],extraName:'',nickname:'',
      businessName:'',businessType:'',legalForm:'',
      idType:Object.keys(settings.idRules||{})[0]||'بطاقة شخصية',idNumber:'',idIssueDate:'',idExpiry:'',idIssuePlace:'',
      birthDate:'',country:'اليمن',birthGov:'',birthDistrict:'',birthArea:'',address:'',
      mobileType:'yemeni',mobile:'',countryCode:'+967',phone:'',email:'',branch:'',
      currencies:[],services:[],authorized:[{name:'',id:'',phone:'',permissions:[],signature:null}],
      sampleSignatures:[null,null,null],mainSignature:null,idPhotos:{},termsAccepted:false
    };
  }),fd=_fd[0],setFd=_fd[1];

  // Save draft
  useEffect(function(){try{localStorage.setItem('iq4_draft',JSON.stringify(fd));}catch(e){}},[fd]);

  var uf=function(f,v){setFd(function(prev){var n=Object.assign({},prev);n[f]=v;return n;});setErrs(function(prev){var n=Object.assign({},prev);delete n[f];return n;});};
  var idRule=(settings.idRules||{})[fd.idType]||{digits:11,expiryYears:10};
  var req=function(f){return reqFields.indexOf(f)>=0;};

  // Auto expiry
  useEffect(function(){if(fd.idIssueDate&&/^\d{4}-\d{2}-\d{2}$/.test(fd.idIssueDate))uf('idExpiry',addYears(fd.idIssueDate,idRule.expiryYears,idRule.expiryMinusDay));},[fd.idIssueDate,fd.idType]);
  // Geo cascading reset
  useEffect(function(){uf('birthGov','');uf('birthDistrict','');uf('birthArea','');},[fd.country]);
  useEffect(function(){uf('birthDistrict','');uf('birthArea','');},[fd.birthGov]);
  useEffect(function(){uf('birthArea','');},[fd.birthDistrict]);

  var provinces=getProvinces(fd.country);
  var districts=getDistricts(fd.country,fd.birthGov);
  var areas=getAreas(fd.country,fd.birthGov,fd.birthDistrict);
  var hasGeo=typeof worldGeoData!=='undefined'&&worldGeoData[fd.country];

  var validate=function(s){
    var e={};
    if(s===1&&!fd.termsAccepted)e.terms='يجب الموافقة';
    if(s===2){
      if(req('names')){for(var i=0;i<3;i++)if(!fd.names[i]||!fd.names[i].trim())e['name_'+i]='مطلوب';}
      if(req('nickname')&&!fd.nickname.trim())e.nickname='مطلوب';
    }
    if(s===3){
      if(req('idNumber')&&!fd.idNumber)e.idNumber='مطلوب';
      else if(fd.idNumber&&fd.idNumber.length!==idRule.digits)e.idNumber='يجب '+idRule.digits+' رقم';
      if(req('idIssueDate')&&!/^\d{4}-\d{2}-\d{2}$/.test(fd.idIssueDate))e.idIssueDate='غير مكتمل';
      if(req('idIssuePlace')&&!fd.idIssuePlace)e.idIssuePlace='مطلوب';
      if(req('birthDate')&&!/^\d{4}-\d{2}-\d{2}$/.test(fd.birthDate))e.birthDate='غير مكتمل';
      else if(fd.birthDate&&calcAge(fd.birthDate)<(settings.minAge||14))e.birthDate='العمر أقل من '+(settings.minAge||14);
    }
    if(s===4){
      if(req('country')&&!fd.country)e.country='مطلوب';
      if(req('birthGov')&&!fd.birthGov)e.birthGov='مطلوب';
      if(req('mobile')&&!fd.mobile)e.mobile='مطلوب';
      else if(fd.mobileType==='yemeni'&&fd.mobile&&!/^(77|71|70|73|78)\d{7}$/.test(fd.mobile))e.mobile='رقم غير صالح';
      if(req('branch')&&!fd.branch)e.branch='مطلوب';
    }
    if(s===5&&req('currencies')&&fd.currencies.length===0)e.currencies='اختر عملة';
    if(s===6){
      if(req('sampleSignatures')&&fd.sampleSignatures.some(function(x){return !x;}))e.sampleSignatures='أكمل التوقيعات';
      if(req('mainSignature')&&!fd.mainSignature)e.mainSignature='مطلوب';
    }
    if(s===7&&req('photos')){var cfg=getPhotoConfig();if(cfg.some(function(c){return !fd.idPhotos[c.id];}))e.photos='أرفق الصور';}
    return e;
  };
  var nx=function(){var er=validate(step);if(Object.keys(er).length===0){setErrs({});setStep(Math.min(step+1,T));}else{setErrs(er);setToast({msg:'أكمل الحقول الإلزامية',type:'error'});setShakeBtn(true);setTimeout(function(){setShakeBtn(false);},500);}};

  var submitForm=function(){
    var allE={};for(var i=1;i<=T;i++)Object.assign(allE,validate(i));
    if(Object.keys(allE).length>0){setErrs(allE);setToast({msg:'حقول ناقصة',type:'error'});return;}
    setSending(true);
    var allNames=fd.names.slice();if(fd.extraName)allNames.push(fd.extraName);
    var fullName=allNames.concat([fd.nickname]).filter(Boolean).join(' ');
    var finalMobile=fd.mobileType==='yemeni'?'+967'+fd.mobile:fd.countryCode+fd.mobile;
    var data=Object.assign({},fd,{fullName:fullName,mobile:finalMobile,names:allNames});
    SDB.submitForm(data).then(function(result){
      if(result.success){
        setSubData(Object.assign({},data,{ref:result.ref}));
        setSubmitted(true);setSending(false);
        try{localStorage.removeItem('iq4_draft');}catch(e){}
        sendEmailNotification(Object.assign({},data,{ref:result.ref}));
      }else{setToast({msg:'حدث خطأ',type:'error'});setSending(false);}
    }).catch(function(){setToast({msg:'خطأ في الاتصال',type:'error'});setSending(false);});
  };

  var getPhotoConfig=function(){if(fd.idType.indexOf('شخصية')>=0||fd.idType.indexOf('ذكية')>=0)return[{id:'front',label:'الوجه الأمامي'},{id:'back',label:'الوجه الخلفي'}];if(fd.idType.indexOf('جواز')>=0)return[{id:'passport',label:'صفحة البيانات'}];return[{id:'main',label:'صورة الهوية'}];};
  var handlePhoto=function(id,file){if(!file)return;var r=new FileReader();r.onload=function(ev){var img=new Image();img.onload=function(){var cvs=document.createElement('canvas');var w=img.width,h=img.height;if(w>800){h*=800/w;w=800;}cvs.width=w;cvs.height=h;cvs.getContext('2d').drawImage(img,0,0,w,h);setFd(function(prev){var n=Object.assign({},prev);n.idPhotos=Object.assign({},prev.idPhotos);n.idPhotos[id]=cvs.toDataURL('image/jpeg',0.6);return n;});};img.src=ev.target.result;};r.readAsDataURL(file);};
  var updateName=function(i,v){var n=fd.names.slice();n[i]=v;uf('names',n);setErrs(function(prev){var e=Object.assign({},prev);delete e['name_'+i];return e;});};

  // SURVEY
  if(surveyDone)return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f1f5f9',padding:16}}><div style={{textAlign:'center',background:'white',padding:40,borderRadius:24,maxWidth:400}}><div style={{fontSize:60,marginBottom:16}}>🙏</div><h2 style={{color:B.purple,fontWeight:900}}>شكراً لك!</h2><p style={{color:'#64748b',marginTop:8}}>نقدر وقتك وملاحظاتك</p><button onClick={p.onBack} style={{marginTop:20,padding:'12px 30px',background:B.purple,color:'white',border:'none',borderRadius:12,fontWeight:800}}>↩ العودة</button></div></div>;

  if(showSurvey)return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f1f5f9',padding:16}}>
    <div className="fade-in" style={{background:'white',padding:'32px 24px',borderRadius:24,maxWidth:500,width:'100%'}}>
      <h2 style={{color:B.purple,fontWeight:900,marginBottom:20,textAlign:'center'}}>📊 استبيان قصير</h2>

  var HW=function(pp){return <span style={{fontFamily:'Aref Ruqaa, Cairo, serif',color:'#1a237e',fontWeight:700,fontSize:pp.big?30:22,display:'inline-block',maxWidth:'100%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',verticalAlign:'bottom'}}>{pp.children}</span>;};
  var FT=function(pp){return <div style={{borderTop:'2px solid #e2e8f0',paddingTop:8,display:'flex',justifyContent:'space-between',fontSize:10,color:'#777',marginTop:'auto'}}><div style={{fontWeight:700}}>ابن قايد المريسي للصرافة والتحويلات</div>{pp.code&&<div>رقم النموذج: {pp.code}</div>}<div>صفحة {pp.pg} من 4</div></div>;};

  return <div id="pdf-output" style={{display:'flex',flexDirection:'column',alignItems:'center',background:'white',padding:0,gap:0}}>

    {/* ===== PAGE 1: COVER ===== */}
    <div className="page-a4"><WM/><div className="content-wrapper" style={{padding:'10mm 15mm 5mm'}}>
      <div className="cover-header">
        <div className="logo-container"><img src={LOGO} className="logo-img" alt=""/></div>
        <h1 className="company-title">ابن قايد المريسي للصرافة والتحويلات</h1>
        <div className="company-subtitle">IBN QAID AL-MARISI EXCHANGE</div>
      </div>
      <div className="file-label-box"><div className="file-label">ملف حساب عميل</div></div>
      <div className="cover-fields">
        <div className="field-row"><div className="field-label"><i className="fas fa-map-marker-alt"/> الفرع:</div><div className="input-display"><HW big={true}>{f.branch||''}</HW></div></div>
        <div className="field-row"><div className="field-label"><i className="fas fa-user-tie"/> اسم العميل:</div><div className="input-display"><HW big={true}>{fullName}</HW></div></div>
        <div className="field-row"><div className="field-label"><i className="fas fa-wallet"/> رقم الحساب:</div><div className="input-display account-input">{ref}</div></div>
      </div>
      <div className="cover-footer">
        <div className="contact-grid">{phones.map(function(p){return <div key={p} className="contact-pill"><i className="fas fa-phone-alt"/>{p}</div>;})}</div>
        <div className="address-bar">{footerAddr}</div>
      </div>
    </div><DM/></div>

    {/* ===== PAGE 2: TERMS (Full original text) ===== */}
    <div className="page-a4"><WM/><div className="content-wrapper" style={{padding:'12mm 18mm',gap:10}}>
      <div className="title-box"><div className="main-title">شروط فتح حساب بغرض التعاملات المالية</div>
        <div className="subtitle">بموجب الموافقة المبدئية من إدارة المنشأة على فتح حساب بغرض التحويل وصرافة العملات، فإنه لاستكمال فتح الحساب يجب استيفاء الشروط التالية:</div>
      </div>
      <ul className="terms-list">
        <li><strong>تعبئة الاستمارة:</strong> تعبئة استمارة (طلب فتح حساب) والتوقيع عليها مع إرفاق صورة البطاقة الشخصية بعد مطابقتها مع الأصل.</li>
        <li><strong>نماذج التوقيعات:</strong> التوقيع على كرت التوقيعات أمام الموظف المختص حصراً.</li>
        <li><strong>السجل التجاري:</strong> إرفاق السجل التجاري بالنسبة للوكلاء والعملاء (سواء كانوا أفراداً أو شركات) وبعد مطابقة الصورة مع الأصل وعلى أن يكون ساري المفعول.</li>
        <li><strong>التفويض:</strong> التوقيع على استمارة التفويض الخاصة لمن سيدير الحسابات أو مندوبين تتم بواسطتهم التعاملات المالية.</li>
        <li><strong>حسن التعامل:</strong> تعهد العميل بتجنب أي عمل أو تصرف يسيء إلى التعامل أو يضعف الثقة بينه وبين المنشأة.</li>
        <li><strong>الغرض من الحساب:</strong> يتم فتح الحساب لغرض الإيداعات والتحويلات وعملية المصارفة فقط.</li>
        <li><strong>الاستخدام المشروع:</strong> يُمنع استخدام الحساب لأي أغراض غير قانونية أو مخالفة للأنظمة المالية المعتمدة.</li>
        <li><strong>مسؤولية المفوضين:</strong> يتحمل العميل كامل المسؤولية القانونية عن أي تعاملات تتم بواسطة الأشخاص المفوضين المدرجين في استمارة التفويض.</li>
        <li><strong>صلاحية الإغلاق:</strong> للمنشأة الحق في إغلاق الحساب وعدم قبول أي إيداع أو تحويل في حالة أن العميل لم يلتزم بما هو متفق عليه أو تجاوز حسابه العمليات الحسابية المعتادة.</li>
        <li><strong>العنوان الرسمي:</strong> يعتبر العنوان الذي تعطونه في بياناتكم هو العنوان الرسمي لكم، وتتحملون مسؤولية تغييره دون إخطار خطي بذلك.</li>
        <li><strong>الإقرار بصحة البيانات:</strong> يقر طالب فتح الحساب بأن جميع البيانات الواردة في استمارة فتح الحساب صحيحة.</li>
      </ul>
      <div className="declaration-section">
        <div className="declaration-text">تم الاطلاع على الشروط أعلاه والموافقة عليها</div>
        <div className="signature-row">
          <div className="sig-block"><span className="sig-label" style={{fontSize:14, fontWeight:800}}>اسم العميل:</span><div className="sig-input" style={{fontSize:22}}><HW big={true}>{fullName}</HW></div></div>
          <div className="sig-block" style={{textAlign:'left'}}><span className="sig-label" style={{fontSize:14, fontWeight:        <div className="signature-row">
          <div className="sig-block" style={{maxWidth:'60%', overflow:'hidden'}}><span className="sig-label" style={{fontSize:14, fontWeight:800}}>اسم العميل:</span><div className="sig-input" style={{fontSize:30}}><HW big={true}>{fullName}</HW></div></div>
          <div className="sig-block" style={{textAlign:'left', maxWidth:'35%'}}><span className="sig-label" style={{fontSize:14, fontWeight:800}}>التوقيع:</span><div className="sig-input" style={{overflow:'hidden'}}>{sig&&<img src={sig} style={{height:71, marginTop:9, maxWidth:'100%', objectFit:'contain'}} alt=""/>}</div></div>
        </div>
}}>التوقيع:</span><div className="sig-input">{sig&&<img src={sig} style={{height:65, marginTop:-15, objectFit:'contain'}} alt=""/>}</div></div>
        </div>
      </div>
      <FT pg={2}/>
    </div><DM/></div>

    {/* ===== PAGE 3: CLIENT DATA (matching original template) ===== */}
    <div className="page-a4"><WM/><div className="content-wrapper page-3-wrapper" style={{padding:'8mm 12mm',gap:10}}>
      <div className="page-header">
        <div className="header-title" style={{fontSize:22}}>استمارة طلب فتح حساب (بيانات العميل)</div>
        <div className="header-meta">
          <div className="meta-field">رقم الطلب: <strong>{ref}</strong></div>
          <div className="meta-field">تاريخ الطلب: <strong>{td}</strong></div>
        </div>
      </div>

      <div className="section-container">
        <div className="section-label"><i className="fas fa-user-circle"/> 1. البيانات الأساسية للعميل / المنشأة</div>
        <div className="fields-grid">
          <div className="field-group" style={{gridColumn:'span 8'}}><span className="label">الاسم الرباعي:</span><div className="input"><HW>{namesOnly}</HW></div></div>
          <div className="field-group" style={{gridColumn:'span 4'}}><span className="label">اللقب:</span><div className="input"><HW>{f.nickname||''}</HW></div></div>
          <div className="field-group" style={{gridColumn:'span 6'}}><span className="label">الاسم التجاري:</span><div className="input"><HW>{f.business_name||f.businessName||''}</HW></div></div>
          <div className="field-group" style={{gridColumn:'span 3'}}><span className="label">نوع النشاط:</span><div className="input"><HW>{f.business_type||f.businessType||''}</HW></div></div>
          <div className="field-group" style={{gridColumn:'span 3'}}><span className="label">الشكل القانوني:</span><div className="input"><HW>{f.legal_form||f.legalForm||''}</HW></div></div>
          <div className="field-group" style={{gridColumn:'span 3'}}><span className="label">نوع الهوية:</span><div className="input"><HW>{f.id_type||f.idType||''}</HW></div></div>
          <div className="field-group" style={{gridColumn:'span 3'}}><span className="label">رقم الهوية:</span><div className="input" style={{fontFamily:'monospace'}}><HW>{f.id_number||f.idNumber||''}</HW></div></div>
          <div className="field-group" style={{gridColumn:'span 3'}}><span className="label">تاريخ الإصدار:</span><div className="input"><HW>{f.id_issue_date||f.idIssueDate||''}</HW></div></div>
          <div className="field-group" style={{gridColumn:'span 3'}}><span className="label">مكان الإصدار:</span><div className="input"><HW>{f.id_issue_place||f.idIssuePlace||''}</HW></div></div>
          <div className="field-group" style={{gridColumn:'span 3'}}><span className="label">تاريخ الانتهاء:</span><div className="input"><HW>{f.id_expiry||f.idExpiry||''}</HW></div></div>
          <div className="field-group" style={{gridColumn:'span 9'}}><span className="label">الجنسية:</span><div className="input"><HW>{f.country||''}</HW></div></div>
        </div>
      </div>

      <div className="section-container">
        <div className="section-label"><i className="fas fa-map-marker-alt"/> 2. العنوان وبيانات الاتصال</div>
        <div className="fields-grid">
          <div className="field-group" style={{gridColumn:'span 12'}}><span className="label">العنوان التفصيلي:</span><div className="input"><HW>{(f.country||'')+' '+(f.province||f.birthGov?'- '+(f.province||f.birthGov):'')+' '+(f.district||f.birthDistrict?'- '+(f.district||f.birthDistrict):'')+' '+(f.area||f.birthArea?'- '+(f.area||f.birthArea):'')+' '+(f.address?'- '+f.address:'')}</HW></div></div>
          <div className="field-group" style={{gridColumn:'span 4'}}><span className="label">رقم الموبايل (1):</span><div className="input" style={{direction:'ltr',textAlign:'right'}}><HW>{f.mobile||''}</HW></div></div>
          <div className="field-group" style={{gridColumn:'span 4'}}><span className="label">الرقم الثابت:</span><div className="input"><HW>{f.phone||''}</HW></div></div>
          <div className="field-group" style={{gridColumn:'span 4'}}><span className="label">البريد الإلكتروني:</span><div className="input"><HW>{f.email||''}</HW></div></div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div className="section-container"><div className="section-label"><i className="fas fa-coins"/> 3. عملات الحساب</div><div className="checkbox-row">{['ريال يمني','ريال سعودي','دولار أمريكي','درهم إماراتي','يورو'].map(function(c){return <div key={c} className="checkbox-item"><Chk on={(f.currencies||[]).indexOf(c)>=0}/> {c}</div>;})}</div></div>
        <div className="section-container"><div className="section-label"><i className="fas fa-headset"/> 4. وسائل طلب الخدمة</div><div className="checkbox-row">{['حضور شخصي','هاتف/SMS','تطبيق WhatsApp','بريد إلكتروني'].map(function(sv){return <div key={sv} className="checkbox-item"><Chk on={(f.services||[]).indexOf(sv)>=0||((f.services||[]).join(' ').indexOf(sv.split('/')[0])>=0)}/> {sv}</div>;})}</div></div>
      </div>

      <div className="signatures-container-p3">
        <div className="section-label" style={{marginBottom:12}}><i className="fas fa-signature"/> 5. نماذج توقيعات العميل المعتمدة</div>
        <div className="sig-grid">{[0,1,2].map(function(i){return <div key={i} className="page-3-sig-card"><div className="sig-card-header">توقيع معتمد ({i+1})</div>{sigs[i]&&<img src={sigs[i]} style={{maxHeight:120,maxWidth:'90%'}} alt=""/>}</div>;})}</div>
      </div>
      <FT pg={3}/>
    </div><DM/></div>

    {/* ===== PAGE 4: AUTH & APPROVALS (matching original template) ===== */}
    <div className="page-a4"><WM/><div className="content-wrapper" style={{padding:'8mm 12mm',gap:14,justifyContent:'space-between'}}>
      <div className="page-header"><div className="header-title" style={{fontSize:20}}>استمارة طلب فتح حساب (المفوضين والموافقات)</div></div>

      <div>
        <div className="section-label"><i className="fas fa-users-cog"/> 6. بيانات الأشخاص المفوضين والصلاحيات الممنوحة</div>
        <div className="auth-table-container"><table className="auth-table">
          <thead><tr><th style={{width:'28%'}}>بيانات المفوض</th><th style={{width:'42%'}}>الصلاحيات المحددة (ضع علامة ✓ في المربع)</th><th style={{width:'30%'}}>نموذج التوقيع</th></tr></thead>
          <tbody>{[0,1].map(function(i){var auths=f.authorized||[];var a=auths[i]||{};return <tr key={i}>
            <td><div style={{marginBottom:8,fontSize:12}}><strong>الاسم:</strong> <HW>{a.name||'....................................'}</HW></div><div style={{marginBottom:8,fontSize:12}}><strong>رقم الهوية:</strong> <HW>{a.id||'..............................'}</HW></div><div style={{fontSize:12}}><strong>الهاتف:</strong> <HW>{a.phone||'....................................'}</HW></div></td>
            <td><div className="permission-grid">{['السحب / الإرسال','الاطلاع على الرصيد','طلب كشف حساب','التحويل الداخلي','التواصل الرسمي','كافة الصلاحيات'].map(function(pp){return <div key={pp} className="perm-item"><Chk on={(a.permissions||[]).indexOf(pp)>=0}/> {pp}</div>;})}</div></td>
            <td style={{verticalAlign:'middle',textAlign:'center'}}><div style={{height:100,border:'1px dashed #999',marginTop:5,background:'#fdfdfd',borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center'}}>{a.signature&&<img src={a.signature} style={{maxHeight:80,maxWidth:'90%'}} alt=""/>}</div></td>
          </tr>;})}</tbody>
        </table></div>
        <div className="legal-note"><i className="fas fa-exclamation-triangle"/> يتحمل صاحب الحساب المسؤولية القانونية الكاملة عن تعاملات المفوضين.</div>
      </div>

      <div className="approval-section">
        <div className="section-label"><i className="fas fa-file-signature"/> 7. إقرار وموافقة العميل (صاحب الحساب)</div>
        <div className="approval-text" style={{fontSize:13,lineHeight:1.8}}>أقر أنا الموقع أدناه بصحة كافة البيانات الواردة في هذا الطلب، وأوافق على تفويض الأشخاص المذكورين، كما أقر باطلاعي وموافقتي على الشروط والأحكام العامة لفتح الحساب والالتزام بها.</div>
        <div style={{borderTop:'1px solid #ddd',margin:'8px 0'}}></div>
        <div className="approval-grid">
          <div className="field-line" style={{maxWidth:'60%', overflow:'hidden'}}><span className="lbl" style={{fontSize:14, fontWeight:800}}>الاسم الكامل (الرباعي):</span><div className="line" style={{fontSize:30}}><HW big={true}>{fullName}</HW></div></div>
          <div className="field-line" style={{maxWidth:'35%', overflow:'hidden'}}><span className="lbl" style={{fontSize:14, fontWeight:800}}>التوقيع المعتمد:</span><div className="line" style={{justifyContent:'center'}}>{sig&&<img src={sig} style={{height:71, marginTop:9, maxWidth:'100%', objectFit:'contain'}} alt=""/>}</div></div>
        </div>
      </div>

      <div className="employee-auth">
        <div style={{fontSize:12,fontWeight:700,width:'50%'}}><i className="fas fa-user-check"/> مصادقة الموظف المختص:<div style={{fontWeight:400,marginTop:5,fontSize:11}}>تم التوقيع أمامي والمطابقة مع أصل الهوية.</div></div>
        <div style={{display:'flex',gap:20,width:'45%'}}>
          <div className="field-line"><span className="lbl">اسم الموظف:</span><div className="line"><HW>{(op&&op.username)||''}</HW></div></div>
          <div className="field-line"><span className="lbl">التوقيع:</span><div className="line" style={{height:40}}></div></div>
        </div>
      </div>

      <div className="admin-decision">
        <div className="admin-title">قرار الإدارة (للاستخدام الرسمي فقط)</div>
        <div className="admin-grid">
          <div className="field-line" style={{textAlign:'center'}}><div className="line"></div><span className="lbl" style={{color:'var(--brand-purple)'}}>مدير الفرع</span></div>
          <div className="stamp-box">ختم المنشأة<br/>(الرسمي)</div>
          <div className="field-line" style={{textAlign:'center'}}><div className="line"></div><span className="lbl" style={{color:'var(--brand-purple)'}}>اعتماد المدير العام</span><div className="line" style={{marginTop:10,width:100,marginRight:'auto',marginLeft:'auto'}}></div><span className="lbl" style={{fontSize:9}}>التاريخ</span></div>
        </div>
      </div>

      <FT pg={4} code="F-03-ACC"/>
    </div><DM/></div>

  </div>;
};

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
