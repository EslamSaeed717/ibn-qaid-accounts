<div id="root"></div>
<script type="text/babel">
const {useState, useRef, useEffect, useCallback} = React;

const B = {purple:'#802a5d', orange:'#f39c12', dark:'#4a1a35', light:'#f8f0f5'};
const LOGO = "https://i.ibb.co/Zpqj6KF0/251029-001757.jpg";

// ============ DATABASE V2.4 (localStorage) ============

  get: (k) => {try{return JSON.parse(localStorage.getItem('iq_'+k))}catch{return null}},

      const currYear = new Date().getFullYear();
      DB.set('admin', {username:'Eslam saeed', password:'775122022', role:'admin'});
      DB.set('users', []); // Array of {id, username, password, role}
      DB.set('submissions', []);
      DB.set('settings', {
        systemActive: true,
        whatsappNumber: '+967775122022',
        branches: ["المركز الرئيسي - الضالع","فرع مريس","فرع دمت","فرع قعطبة","فرع صنعاء","فرع عدن","فرع تعز"],
        currencies: ['ريال يمني','ريال سعودي','دولار أمريكي','درهم إماراتي','يورو'],
        services: ['الحضور الشخصي','الاتصال الهاتفي','رسائل SMS','تطبيق WhatsApp'],
        countries: Object.keys(worldGeoData),
        legalForms: ["مؤسسة فردية", "شركة ذات مسؤولية محدودة", "شركة تضامنية", "شركة مساهمة"],

        },

          'بطاقة شخصية': {digits: 11, expiryYears: 10},
          'جواز سفر': {digits: 8, expiryYears: 6},
          'بطاقة عائلية': {digits: 11, expiryYears: 10}
        },

        // Mandatory Fields
        requiredFields: ['names', 'nickname', 'idType', 'idNumber', 'idIssueDate', 'idIssuePlace', 'birthDate', 'country', 'birthGov', 'mobile', 'branch', 'currencies', 'mainSignature', 'photos', 'sampleSignatures']
      });
      DB.set('initialized', true);
    }
  }
};
DB.init();

// ============ HELPERS ============
const today = () => new Date().toLocaleDateString('ar-YE',{year:'numeric',month:'long',day:'numeric'});
const isoDate = () => new Date().toISOString().split('T')[0];
const addYears = (dateStr, years) => {
  if(!dateStr || dateStr.includes('--')) return '';
  const d = new Date(dateStr); d.setFullYear(d.getFullYear() + years);
  return d.toISOString().split('T')[0];
};

const ALL_FIELDS = {
    names: 'الاسم الشخصي', nickname: 'اللقب العائلي', businessName: 'الاسم التجاري', businessType: 'نوع النشاط', legalForm: 'الشكل القانوني',
    idType: 'نوع الهوية', idNumber: 'رقم الهوية', idIssueDate: 'تاريخ الإصدار', idIssuePlace: 'مكان الإصدار', birthDate: 'تاريخ الميلاد',
    country: 'الدولة', birthGov: 'المحافظة', birthDistrict: 'المديرية', address: 'العنوان التفصيلي/المنطقة', mobile: 'رقم الجوال',
    phone: 'رقم الهاتف', email: 'البريد الإلكتروني', branch: 'الفرع المعتمد', currencies: 'العملات المطلوبة', services: 'وسائل الخدمة',
    mainSignature: 'التوقيع الرئيسي', photos: 'مرفقات الهوية', sampleSignatures: 'نماذج التوقيعات'
};

// ============ SHARED UI ============
const inp = (err) => ({width:'100%', padding:'11px 13px', background:err?'#fef2f2':'#f8fafc', border:`1.5px solid ${err?'#fca5a5':'#e2e8f0'}`, borderRadius:12, outline:'none', fontSize:15, boxSizing:'border-box'});
const chip = (on) => ({padding:'8px 14px', borderRadius:10, border:`1.5px solid ${on?B.purple:'#e2e8f0'}`, background:on?B.purple:'white', color:on?'white':'#64748b', fontSize:13, fontWeight:700, cursor:'pointer'});
const Fld = ({label, req, err, errMsg, children}) => <div style={{marginBottom:10}}><label style={{display:'flex',alignItems:'center',gap:4,fontSize:13,fontWeight:700,color:err?'#ef4444':'#64748b',marginBottom:3}}>{label}{req&&<span style={{color:'#ef4444'}}>*</span>}{err&&<span style={{fontSize:10,color:'#ef4444',background:'#fef2f2',padding:'1px 6px',borderRadius:4}}>⚠ {errMsg||'مطلوب'}</span>}</label>{children}</div>;
const Toast = ({msg, type, onClose}) => {
  useEffect(()=>{const t=setTimeout(onClose,4000);return()=>clearTimeout(t);},[]);
  const colors = {success:{bg:'#dcfce7',color:'#16a34a',icon:'✓'}, error:{bg:'#fef2f2',color:'#dc2626',icon:'✕'}, info:{bg:'#dbeafe',color:'#1d4ed8',icon:'ℹ'}};
  const c = colors[type] || colors.info;
  return <div className="toast" style={{background:c.bg,color:c.color}}><span style={{fontSize:16}}>{c.icon}</span>{msg}</div>;
};

// ============ CUSTOM DATE PICKER V4 ============
const DatePicker = ({ value, onChange, err, minY, maxY }) => {
    const [day, setDay] = useState('');
    const [month, setMonth] = useState('');
    const [year, setYear] = useState('');

    useEffect(() => {
        if (value && /^\d{4}-\d{2}-\d{2}$/.test(value)) {
            const parts = value.split('-');
            setYear(parts[0]);
            setMonth(String(parseInt(parts[1])));
            setDay(String(parseInt(parts[2])));
        } else if (!value) {
            setDay(''); setMonth(''); setYear('');
        }
    }, [value]);

    const handlePartChange = (part, newValue) => {
        let newDay = day, newMonth = month, newYear = year;
        if (part === 'day') { setDay(newValue); newDay = newValue; }
        if (part === 'month') { setMonth(newValue); newMonth = newValue; }
        if (part === 'year') { setYear(newValue); newYear = newValue; }

        if (newYear && newMonth && newDay) {
            const daysInMonth = new Date(newYear, newMonth, 0).getDate();
            if (parseInt(newDay) <= daysInMonth) {
                onChange(`${newYear}-${String(newMonth).padStart(2, '0')}-${String(newDay).padStart(2, '0')}`);
            } else {
                setDay('');
            }
        }
    };

    const style = {width:'100%', padding:'10px', background:err?'#fef2f2':'#f8fafc', border:`1.5px solid ${err?'#fca5a5':'#e2e8f0'}`, borderRadius:8, outline:'none', fontSize:15};
    const years = []; for(let i = maxY; i >= minY; i--) years.push(i);
    const monthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
    const daysInSelectedMonth = year && month ? new Date(year, month, 0).getDate() : 31;
    const days = Array.from({ length: daysInSelectedMonth }, (_, i) => i + 1);

    return (
        <div>
            <div style={{display:'flex', gap:6}}>
                <select style={{...style, flex:1.2}} value={day} onChange={e => handlePartChange('day', e.target.value)}>
                    <option value="">اليوم</option>
                    {days.map(d => <option key={d} value={d}>{d}</option>)}
                </select>
                <select style={{...style, flex:1.5}} value={month} onChange={e => handlePartChange('month', e.target.value)}>
                    <option value="">الشهر</option>
                    {monthNames.map((name, i) => <option key={i+1} value={i+1}>{name}</option>)}
                </select>
                <select style={{...style, flex:1.5}} value={year} onChange={e => handlePartChange('year', e.target.value)}>
                    <option value="">السنة</option>
                    {years.map(yr => <option key={yr} value={yr}>{yr}</option>)}
                </select>
            </div>
            {value && /^\d{4}-\d{2}-\d{2}$/.test(value) && 
                <div style={{marginTop:8, fontSize:14, fontWeight:700, color:B.purple, background:'#f0fdf4', padding:'8px 12px', borderRadius:8, textAlign:'center'}}>
                    التاريخ المحدد: {new Date(value).toLocaleDateString('ar-YE', {year:'numeric', month:'long', day:'numeric'})}
                </div>
            }
        </div>
    );
};

// ============ FULL SCREEN SIGNATURE MODAL ============
const SignatureModal = ({ label, onSave, onClose, init }) => {
  const ref = useRef(null); const [dr, setDr] = useState(false); const [has, setHas] = useState(!!init);
  
  useEffect(() => {
    const canvas = ref.current; canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight;
    const ctx = canvas.getContext('2d'); ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = B.purple;
    if(init){const img = new Image(); img.onload = () => ctx.drawImage(img,0,0, canvas.width, canvas.height); img.src = init; setHas(true);}
  }, []);

  const gp = (e) => {const c=ref.current, r=c.getBoundingClientRect(); const cx=e.clientX??(e.touches?.[0]?.clientX); const cy=e.clientY??(e.touches?.[0]?.clientY); return {x:cx-r.left, y:cy-r.top};};
  const st = (e) => {e.preventDefault(); const p=gp(e); ref.current.getContext('2d').beginPath(); ref.current.getContext('2d').moveTo(p.x, p.y); setDr(true);};
  const mv = (e) => {e.preventDefault(); if(!dr) return; const p=gp(e); const ctx=ref.current.getContext('2d'); ctx.lineTo(p.x, p.y); ctx.stroke(); setHas(true);};
  const en = () => {if(dr) setDr(false);};
  const cl = () => {ref.current.getContext('2d').clearRect(0,0,ref.current.width,ref.current.height); setHas(false);};
  
  return (
    <div className="modal-overlay">
      <div className="modal-content slide-up" style={{display:'flex', flexDirection:'column', height:'80vh', maxHeight:'500px'}}>
        <div style={{background:B.purple, color:'white', padding:'16px 20px', display:'flex', justifyContent:'space-between', alignItems:'center'}}><h3 style={{margin:0, fontSize:18, fontWeight:800}}>لوحة التوقيع: {label}</h3><button onClick={onClose} style={{background:'none', border:'none', color:'white', fontSize:24}}>&times;</button></div>
        <div style={{flex:1, background:'#f8fafc', position:'relative', cursor:'crosshair'}}>
          {!has && <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', pointerEvents:'none', color:'#cbd5e1', fontSize:32, fontWeight:900, opacity:0.5}}>وقّع هنا في المساحة الفارغة</div>}
          <canvas ref={ref} style={{width:'100%', height:'100%', touchAction:'none'}} onMouseDown={st} onMouseMove={mv} onMouseUp={en} onMouseLeave={en} onTouchStart={st} onTouchMove={mv} onTouchEnd={en}/>
        </div>
        <div style={{padding:'16px', display:'flex', gap:'12px', background:'white', borderTop:'1px solid #e2e8f0'}}>
          <button onClick={cl} style={{flex:1, padding:'14px', background:'#fef2f2', color:'#dc2626', border:'none', borderRadius:'12px', fontSize:16, fontWeight:800}}>🔄 إعادة المحاولة</button>
          <button onClick={()=>{if(has) onSave(ref.current.toDataURL()); onClose();}} disabled={!has} style={{flex:2, padding:'14px', background:has?B.purple:'#cbd5e1', color:'white', border:'none', borderRadius:'12px', fontSize:16, fontWeight:800}}>✅ حفظ التوقيع</button>
        </div>
      </div>
    </div>
  );
};

// ============ LOGIN ============
const LoginScreen = ({onLogin, onPublicForm}) => {
  const [username, setUsername] = useState(''); const [pass, setPass] = useState(''); const [err, setErr] = useState('');
  const settings = DB.get('settings');
  const go = () => {
    const admin = DB.get('admin');
    const users = DB.get('users') || [];
    if(username === admin.username && pass === admin.password) {
        return onLogin({...admin});
    }
    const user = users.find(u => u.username === username && u.password === pass);
    if(user) {
        if(!settings.systemActive) { setErr('النظام متوقف حالياً'); return; }
        return onLogin({...user});
    }
    setErr('بيانات الدخول غير صحيحة');
  };
  return(
    <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:`linear-gradient(135deg,${B.dark},${B.purple})`, padding:16}}>
      <div style={{width:'100%', maxWidth:420, background:'white', borderRadius:28, overflow:'hidden', boxShadow:'0 30px 60px rgba(0,0,0,0.3)'}}>
        <div style={{height:5, background:`linear-gradient(90deg,${B.orange},${B.purple})`}}/>
        <div style={{padding:'40px 32px 32px'}}>
          <div style={{textAlign:'center', marginBottom:32}}>
            <img src={LOGO} style={{height:80, marginBottom:12}} alt=""/>
            <h1 style={{fontSize:22, fontWeight:900, color:B.purple}}>نظام فتح الحسابات V2.4</h1>
          </div>
          {err && <div style={{padding:10, background:'#fef2f2', color:'#dc2626', borderRadius:10, marginBottom:14, fontSize:13, fontWeight:700}}>{err}</div>}
          <div style={{marginBottom:14}}><input type="text" value={username} onChange={e=>{setUsername(e.target.value);setErr('');}} placeholder="اسم المستخدم" style={inp()}/></div>
          <div style={{marginBottom:24}}><input type="password" value={pass} onChange={e=>{setPass(e.target.value);setErr('');}} placeholder="كلمة المرور" style={inp()}/></div>
          <button onClick={go} style={{width:'100%', padding:14, background:B.purple, color:'white', border:'none', borderRadius:14, fontSize:16, fontWeight:900}}>تسجيل الدخول للإدارة</button>
          {settings.systemActive && <button onClick={onPublicForm} style={{width:'100%', marginTop:14, padding:14, background:'white', color:B.purple, border:`2px solid ${B.orange}`, borderRadius:14, fontSize:14, fontWeight:800}}>📝 تقديم طلب عميل جديد</button>}
        </div>
      </div>
    </div>
  );
};

            <div style={{background:'#f0fdf4', padding:16, borderRadius:14, border:'1px solid #bbf7d0', marginBottom:20}}>
                <p style={{margin:0, fontSize:14, color:'#16a34a', fontWeight:700}}>الحقول المحددة باللون البنفسجي ستكون إلزامية على العميل، ولن يتمكن من إرسال الطلب دون تعبئتها.</p>
            </div>
            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(220px, 1fr))', gap:10}}>
                {Object.entries(ALL_FIELDS).map(([key, label]) => {
                    const isReq = (settings.requiredFields || []).includes(key);
                    return (
                        <div key={key} onClick={()=>toggleReq(key)} style={{padding:'14px', background:isReq?B.purple:'#f8fafc', color:isReq?'white':'#475569', border:`2px solid ${isReq?B.purple:'#e2e8f0'}`, borderRadius:12, cursor:'pointer', display:'flex', alignItems:'center', gap:10, fontWeight:700, fontSize:14, transition:'0.2s'}}>
                            <div style={{width:20, height:20, borderRadius:6, border:`2px solid ${isReq?'white':'#cbd5e1'}`, display:'flex', alignItems:'center', justifyContent:'center'}}>{isReq && '✓'}</div>
                            {label}
                        </div>
                    );
                })}
            </div>
          </div>}

        </div>
      </div>
    </div>
  );
};

// ============ CLIENT FORM (Dynamically Controlled) ============
const ClientForm = ({onBack}) => {
  const settings = DB.get('settings');
  const reqFields = settings.requiredFields || [];
  const [step, setStep] = useState(1); const T = 7;
  const [errs, setErrs] = useState({}); const [toast, setToast] = useState(null);
  const [submitted, setSubmitted] = useState(false); const [subData, setSubData] = useState(null);
  const [activeSig, setActiveSig] = useState(null);

  const [fd, setFd] = useState({
    accountType: 'شخصي', names: Array(settings.nameFieldCount).fill(''), nickname: '',
    businessName: '', businessType: '', legalForm: '',
    idType: Object.keys(settings.idRules)[0], idNumber: '', idIssueDate: '', idExpiry: '', idIssuePlace: '',
    birthDate: '', country: 'اليمن', birthGov: '', birthDistrict: '', address: '', 
    mobileType: 'yemeni', mobile: '', countryCode: '+967', phone: '', email: '', branch: '',
    currencies: [], services: [], authorized: [{name:'', id:'', phone:'', permissions:[], signature:null}],
    sampleSignatures: [null, null, null], mainSignature: null, idPhotos: {}, termsAccepted: false
  });

  const uf = (f, v) => setFd(p => ({...p, [f]: v}));
  const updateName = (i, v) => { const n = [...fd.names]; n[i] = v; uf('names', n); };
  const addNameField = () => { if(fd.names.length < 6) uf('names', [...fd.names, '']); };
  const idRule = settings.idRules[fd.idType];
  const currentYear = new Date().getFullYear();

  useEffect(() => {
    if(fd.idIssueDate && !fd.idIssueDate.includes('--') && idRule) {
      uf('idExpiry', addYears(fd.idIssueDate, idRule.expiryYears));
    }
  }, [fd.idIssueDate, fd.idType]);

  const req = (field) => reqFields.includes(field);

  // دالة التحقق لكل خطوة على حدة
  const validate = (checkStep) => {
    const e = {};
    if(checkStep === 1 && !fd.termsAccepted) e.terms = 'يجب الموافقة';
    if(checkStep === 2) {
      if(req('names')) fd.names.forEach((n, i) => { if(i < settings.nameFieldCount && !n.trim()) e[`name_${i}`] = 'مطلوب'; });
      if(req('nickname') && !fd.nickname.trim()) e.nickname = 'مطلوب';
      if(fd.accountType === 'تجاري') {
        if(req('businessName') && !fd.businessName) e.businessName = 'مطلوب'; 
        if(req('businessType') && !fd.businessType) e.businessType = 'مطلوب'; 
        if(req('legalForm') && !fd.legalForm) e.legalForm = 'مطلوب';
      }
    }
    if(checkStep === 3) {
      if(req('idNumber') && !fd.idNumber) e.idNumber = 'مطلوب';
      else if(fd.idNumber && idRule && fd.idNumber.length !== idRule.digits) e.idNumber = `يجب أن يكون ${idRule.digits} رقم`;
      if(req('idIssueDate') && (!fd.idIssueDate || !/^\d{4}-\d{2}-\d{2}$/.test(fd.idIssueDate))) e.idIssueDate = 'تاريخ غير مكتمل';
      if(req('idIssuePlace') && !fd.idIssuePlace) e.idIssuePlace = 'مطلوب';
      if(req('birthDate') && (!fd.birthDate || !/^\d{4}-\d{2}-\d{2}$/.test(fd.birthDate))) e.birthDate = 'تاريخ غير مكتمل';
    }
    if(checkStep === 4) { 
      if(req('country') && !fd.country) e.country = 'مطلوب';
      if(fd.country === 'اليمن') {
          if(req('birthGov') && !fd.birthGov) e.birthGov = 'مطلوب';
      }
      if(req('address') && !fd.address) e.address = 'مطلوب';
      if(req('mobile') && !fd.mobile) e.mobile = 'مطلوب';
      if(fd.mobileType === 'yemeni' && fd.mobile) {
        if(!/^(77|71|70|73|78)\d{7}$/.test(fd.mobile)) e.mobile = 'رقم يمني غير صالح (9 أرقام)';
      }
      if(req('branch') && !fd.branch) e.branch = 'مطلوب'; 
    }
    if(checkStep === 5) {
        if(req('currencies') && fd.currencies.length === 0) e.currencies = 'مطلوب عملة واحدة على الأقل';
    }
    if(checkStep === 6) {
        if (fd.sampleSignatures.some(s => !s)) e.sampleSignatures = 'يجب إكمال جميع نماذج التوقيعات الثلاثة';
        if (!fd.mainSignature) e.mainSignature = 'التوقيع الرئيسي للإقرار إلزامي';
    }
    if(checkStep === 7 && req('photos')) {
        const requiredPhotos = getPhotoConfig();
        if(requiredPhotos.some(p => !fd.idPhotos[p.id])) e.photos = 'الرجاء إرفاق جميع صور الوثائق';
    }
    return e;
  };

  const nx = () => { 
    const stepErrors = validate(step);
    if (Object.keys(stepErrors).length === 0) {
      setStep(s => Math.min(s+1, T));
    } else {
      setErrs(stepErrors);
      setToast({msg:'يرجى إكمال الحقول الإلزامية بدقة', type:'error'});
    }
  };

  const submitForm = () => {
    const findFirstErrorStep = (errors) => {
        const fieldToStepMap = {
            terms: 1, names: 2, nickname: 2, businessName: 2,
            idType: 3, idNumber: 3, idIssueDate: 3, idIssuePlace: 3, birthDate: 3,
            country: 4, birthGov: 4, address: 4, mobile: 4, branch: 4,
            currencies: 5,
            sampleSignatures: 6, mainSignature: 6,
            photos: 7
        };
        for (const errorKey in errors) {
            const baseKey = errorKey.split('_')[0];
            if (fieldToStepMap[baseKey]) {
                return fieldToStepMap[baseKey];
            }
        }
        return null;
    };

    const allErrors = {};
    for (let i = 1; i <= T; i++) {
        const stepErrors = validate(i);
        Object.assign(allErrors, stepErrors);
    }

    if (Object.keys(allErrors).length > 0) {
        const firstErrorStep = findFirstErrorStep(allErrors);
        setErrs(allErrors);
        setToast({msg: `هناك حقول إلزامية ناقصة. يرجى مراجعة الخطوة ${firstErrorStep || ''}.`, type: 'error'});
        return;
    }

    const fullName = [...fd.names, fd.nickname].filter(Boolean).join(' ');
    const subs = DB.get('submissions') || [];
    const count = subs.filter(s => s.id.startsWith(currentYear.toString())).length + 1;
    const finalId = `${currentYear}-${count.toString().padStart(4, '0')}`;
    const finalMobile = fd.mobileType === 'yemeni' ? '+967' + fd.mobile : fd.countryCode + fd.mobile;
    const submission = {...fd, fullName, mobile: finalMobile, id: finalId, status: 'pending', submittedAt: isoDate()};
    DB.set('submissions', [...subs, submission]);
    setSubData(submission); 
    setSubmitted(true);
  };

  const sendWhatsApp = () => {
    const text = encodeURIComponent(`انا العميل ${subData.fullName} قدمت طلب فتح حساب رقم ${subData.id}`);
    window.open(`https://wa.me/${settings.whatsappNumber.replace('+','')}?text=${text}`, '_blank');
  };

  const getPhotoConfig = () => {
    if(fd.idType.includes('شخصية')) return [{id:'front', label:'الوجه الأمامي'}, {id:'back', label:'الوجه الخلفي'}];
    if(fd.idType.includes('جواز')) return [{id:'passport', label:'صورة صفحة البيانات'}];
    if(fd.idType.includes('عائلية')) return [{id:'page1', label:'الصفحة الأولى'}, {id:'page2', label:'الصفحة الثانية'}, {id:'page3', label:'الصفحة الثالثة'}];
    return [{id:'main', label:'صورة الهوية'}];
  };

  const handlePhoto = (id, file) => {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => setFd(p => ({...p, idPhotos: {...p.idPhotos, [id]: e.target.result}}));
    reader.readAsDataURL(file);
  };

  const SigBox = ({id, label, val}) => (
    <div onClick={()=>setActiveSig(id)} style={{border:`2px dashed ${val?B.purple:'#cbd5e1'}`, borderRadius:12, padding:14, background:'#f8fafc', textAlign:'center', cursor:'pointer', minHeight:100, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center'}}>
      {val ? <img src={val} style={{maxHeight:70, maxWidth:'100%'}} alt=""/> : <div style={{color:'#94a3b8', fontSize:13, fontWeight:700}}><i className="fas fa-pen-nib" style={{fontSize:20, display:'block', marginBottom:8}}/>اضغط هنا للتوقيع<br/>{label}</div>}
    </div>
  );

  if(submitted) return (
    <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#f1f5f9', padding:16}}>
      <div className="slide-up" style={{textAlign:'center', background:'white', padding:'40px 20px', borderRadius:24, boxShadow:'0 10px 30px rgba(0,0,0,0.1)', maxWidth:500, width:'100%'}}>
        <div style={{width:80, height:80, borderRadius:'50%', background:'#dcfce7', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 20px', fontSize:40}}>✅</div>
        <h2 style={{color:B.purple, fontWeight:900, marginBottom:10}}>لقد قمت بكل الخطوات بنجاح!</h2>
        <p style={{color:'#64748b', fontSize:15, lineHeight:1.8}}>الآن لقد تم رفع طلبك بنجاح وهو تحت المراجعة من قبل الإدارة المعتمدة.</p>
        <div style={{background:'#fffcf5', border:`2px dashed ${B.orange}`, borderRadius:14, padding:20, margin:'20px 0'}}>
          <p style={{margin:0, fontSize:14, color:'#475569', fontWeight:700}}>رقم طلبك المرجعي:</p>
          <h1 style={{margin:0, fontSize:36, color:B.purple, letterSpacing:2}}>{subData.id}</h1>
        </div>
        <button onClick={sendWhatsApp} style={{width:'100%', padding:'16px', background:'#25D366', color:'white', border:'none', borderRadius:14, fontSize:16, fontWeight:900, marginBottom:12, display:'flex', alignItems:'center', justifyContent:'center', gap:10}}>
          <i className="fab fa-whatsapp" style={{fontSize:22}}/> إرسال الطلب للإدارة
        </button>
        <button onClick={onBack} style={{background:'none', border:'none', color:'#94a3b8', fontSize:14, fontWeight:700, textDecoration:'underline'}}>العودة للرئيسية</button>
      </div>
    </div>
  );

  const labels = ['الشروط القانونية','البيانات الأساسية','بيانات الهوية والتواريخ','العنوان والتواصل','العملات والخدمات','التفويض والتوقيعات','إرفاق الوثائق'];

  return (
    <div style={{minHeight:'100vh', background:'#f1f5f9', padding:'16px 10px'}}>
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
      {activeSig !== null && <SignatureModal 
          label={activeSig === 'main' ? 'التوقيع الرئيسي للإقرار' : `نموذج (${activeSig + 1})`} 
          init={activeSig === 'main' ? fd.mainSignature : fd.sampleSignatures[activeSig]} 
          onSave={img => {
              if (activeSig === 'main') {
                  uf('mainSignature', img);
              } else {
                  const s = [...fd.sampleSignatures];
                  s[activeSig] = img;
                  uf('sampleSignatures', s);
              }
          }} 
          onClose={() => setActiveSig(null)}
      />}

      <div className="no-print" style={{maxWidth:700, margin:'0 auto'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14}}>
          <button onClick={onBack} style={{padding:'8px 14px', background:'white', border:'1px solid #e2e8f0', borderRadius:10, fontSize:13, fontWeight:700, color:'#64748b'}}>↩ العودة</button>
        </div>
        <div style={{background:'white', borderRadius:24, boxShadow:'0 16px 48px rgba(128,42,93,0.1)', overflow:'hidden'}}>
          <div style={{padding:'20px 24px 16px', borderBottom:'1px solid #f1f5f9'}}>
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:12}}><img src={LOGO} style={{height:42}} alt=""/><div><p style={{margin:0, fontSize:11, fontWeight:800, color:B.orange}}>مرحلة {step} من {T}</p><h2 style={{margin:0, fontSize:18, fontWeight:900, color:B.purple}}>{labels[step-1]}</h2></div></div>
            <div style={{display:'flex', gap:4}}>{Array.from({length:T},(_,i)=><div key={i} style={{flex:1, height:4, borderRadius:2, background:i<step?B.purple:'#e2e8f0'}}/>)}</div>
          </div>

          <div style={{padding:'20px 24px', minHeight:400}}>
            {/* STEP 1: TERMS */}
            {step===1 && <div className="fade-in">
              <div style={{background:'#fffbeb', padding:'20px', borderRadius:16, borderRight:`5px solid ${B.orange}`, marginBottom:20, maxHeight:'350px', overflowY:'auto'}}>
                <h3 style={{color:B.purple, fontWeight:900, marginBottom:14, fontSize:16}}>شروط فتح حساب بغرض التعاملات المالية</h3>
                <ul style={{fontSize:14, lineHeight:1.8, color:'#334155', paddingRight:20}}>
                  <li><strong>تعبئة الاستمارة:</strong> تعبئة استمارة (طلب فتح حساب) والتوقيع عليها مع إرفاق صورة البطاقة الشخصية بعد مطابقتها مع الأصل.</li>
                  <li><strong>نماذج التوقيعات:</strong> التوقيع على كرت التوقيعات أمام الموظف المختص حصراً.</li>
                  <li><strong>السجل التجاري:</strong> إرفاق السجل التجاري بالنسبة للوكلاء والعملاء (أفراد/شركات) ساري المفعول.</li>
                  <li><strong>التفويض:</strong> التوقيع على استمارة التفويض الخاصة لمن سيدير الحسابات.</li>
                  <li><strong>حسن التعامل:</strong> تعهد العميل بتجنب أي عمل أو تصرف يسيء إلى التعامل أو يضعف الثقة.</li>
                  <li><strong>الغرض من الحساب:</strong> يتم فتح الحساب لغرض الإيداعات والتحويلات والمصارفة فقط.</li>
                  <li><strong>الاستخدام المشروع:</strong> يُمنع استخدام الحساب لأي أغراض غير قانونية أو مخالفة.</li>
                  <li><strong>مسؤولية المفوضين:</strong> يتحمل العميل كامل المسؤولية القانونية عن أي تعاملات تتم بواسطة المفوضين.</li>
                  <li><strong>صلاحية الإغلاق:</strong> للمنشأة الحق في إغلاق الحساب في حالة عدم التزام العميل.</li>
                  <li><strong>العنوان الرسمي:</strong> يعتبر العنوان المعطى هو الرسمي، والعميل مسؤول عن تغييره.</li>
                  <li><strong>الإقرار:</strong> يقر طالب فتح الحساب بأن جميع البيانات الواردة صحيحة.</li>
                </ul>
              </div>
              <label style={{display:'flex', alignItems:'center', gap:10, padding:14, background:fd.termsAccepted?'#f8f0f5':'white', border:`2px solid ${errs.terms?'#fca5a5':fd.termsAccepted?B.purple:'#e2e8f0'}`, borderRadius:14, cursor:'pointer', transition:'0.2s'}}>
                <input type="checkbox" checked={fd.termsAccepted} onChange={e=>uf('termsAccepted',e.target.checked)} style={{width:20, height:20, accentColor:B.purple}}/>
                <span style={{fontSize:15, fontWeight:800, color:fd.termsAccepted?B.purple:'#475569'}}>تم الاطلاع وأقر بالموافقة الكاملة</span>
              </label>
            </div>}

            {/* STEP 2: NAMES & TYPE */}
            {step===2 && <div className="fade-in">
              {req('accountType') && <div style={{display:'flex', background:'#f8fafc', padding:6, borderRadius:12, marginBottom:20}}>
                {['شخصي', 'تجاري'].map(t => <button key={t} onClick={()=>uf('accountType', t)} style={{flex:1, padding:'10px', background:fd.accountType===t?B.purple:'transparent', color:fd.accountType===t?'white':'#64748b', border:'none', borderRadius:8, fontWeight:800, fontSize:14, transition:'0.3s'}}>{t}</button>)}
              </div>}

              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
                <div style={{gridColumn:'span 2', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                  <h4 style={{fontSize:16, fontWeight:800, color:B.purple, margin:0}}>الاسم الشخصي للعميل</h4>
                  <button type="button" onClick={addNameField} style={{background:'none', border:`1px dashed ${B.purple}`, color:B.purple, borderRadius:30, padding:'4px 14px', fontSize:13, fontWeight:700}}>+ إضافة اسم إضافي</button>
                </div>
                {fd.names.map((n, i) => (
                  <Fld key={i} label={`الاسم (${i+1})`} req={req('names') && i < settings.nameFieldCount} err={errs[`name_${i}`]}>
                    <input style={inp(errs[`name_${i}`])} value={n} onChange={e=>updateName(i, e.target.value)} placeholder={`الاسم ${i+1}`}/>
                  </Fld>
                ))}
                <Fld label="اللقب العائلي" req={req('nickname')} err={errs.nickname}><input style={inp(errs.nickname)} value={fd.nickname} onChange={e=>uf('nickname', e.target.value)} placeholder="اللقب"/></Fld>
              </div>

              {fd.accountType === 'تجاري' && <div className="fade-in" style={{marginTop:20, paddingTop:20, borderTop:'2px dashed #e2e8f0'}}>
                <h4 style={{fontSize:16, fontWeight:800, color:B.purple, margin:'0 0 12px'}}>بيانات النشاط التجاري</h4>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
                  <div style={{gridColumn:'span 2'}}><Fld label="الاسم التجاري" req={req('businessName')} err={errs.businessName}><input style={inp(errs.businessName)} value={fd.businessName} onChange={e=>uf('businessName', e.target.value)}/></Fld></div>
                  <Fld label="نوع النشاط" req={req('businessType')} err={errs.businessType}><input style={inp(errs.businessType)} value={fd.businessType} onChange={e=>uf('businessType', e.target.value)}/></Fld>
                  <Fld label="الشكل القانوني" req={req('legalForm')} err={errs.legalForm}><select style={inp(errs.legalForm)} value={fd.legalForm} onChange={e=>uf('legalForm', e.target.value)}><option value="">اختر</option>{settings.legalForms.map(l=><option key={l}>{l}</option>)}</select></Fld>
                </div>
              </div>}
            </div>}

            {/* STEP 3: ID & DATES */}
            {step===3 && <div className="fade-in">
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
                <Fld label="نوع الهوية" req={req('idType')}><select style={inp()} value={fd.idType} onChange={e=>{uf('idType',e.target.value); uf('idNumber',''); uf('idPhotos',{});}}>{Object.keys(settings.idRules).map(t=><option key={t}>{t}</option>)}</select></Fld>
                <Fld label={`رقم الهوية (${idRule.digits} رقم)`} req={req('idNumber')} err={errs.idNumber} errMsg={errs.idNumber}><input style={{...inp(errs.idNumber), fontFamily:'monospace', fontWeight:700, letterSpacing:2}} value={fd.idNumber} onChange={e=>uf('idNumber', e.target.value.replace(/\D/g,'').slice(0,idRule.digits))} placeholder={'0'.repeat(idRule.digits)}/></Fld>
                
                <div style={{gridColumn:'span 2'}}>
                  <Fld label="تاريخ الإصدار" req={req('idIssueDate')} err={errs.idIssueDate}>
                    <DatePicker value={fd.idIssueDate} onChange={v=>uf('idIssueDate', v)} err={errs.idIssueDate} minY={settings.dateRanges.issueDate.min} maxY={settings.dateRanges.issueDate.max}/>
                  </Fld>
                </div>
                <Fld label="تاريخ الانتهاء (تلقائي)"><div style={{...inp(), background:'#f0fdf4', color:'#16a34a', fontWeight:700, display:'flex', alignItems:'center'}}>{fd.idExpiry || '—'}</div></Fld>
                <Fld label="مكان الإصدار" req={req('idIssuePlace')} err={errs.idIssuePlace}><select style={inp(errs.idIssuePlace)} value={fd.idIssuePlace} onChange={e=>uf('idIssuePlace', e.target.value)}><option value="">اختر</option>{settings.yemenGovs && settings.yemenGovs.map(p=><option key={p}>{p}</option>)}</select></Fld>
                
                <div style={{gridColumn:'span 2', marginTop:10, paddingTop:10, borderTop:'1px solid #f1f5f9'}}>
                  <Fld label="تاريخ الميلاد" req={req('birthDate')} err={errs.birthDate} errMsg={errs.birthDate}>
                    <DatePicker value={fd.birthDate} onChange={v=>uf('birthDate', v)} err={errs.birthDate} minY={settings.dateRanges.birthDate.min} maxY={settings.dateRanges.birthDate.max}/>
                  </Fld>
                </div>
              </div>
            </div>}

            {/* STEP 4: CONTACT & HIERARCHICAL ADDRESS */}
            {step===4 && <div className="fade-in">
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
                <div style={{gridColumn:'span 2'}}><Fld label="الدولة" req={req('country')} err={errs.country}><select style={inp(errs.country)} value={fd.country} onChange={e=>{uf('country', e.target.value); uf('birthGov',''); uf('birthDistrict',''); uf('address','');}}><option value="">اختر الدولة</option>{settings.countries.map(c=><option key={c}>{c}</option>)}</select></Fld></div>
                
                {fd.country && worldGeoData[fd.country] ? (
                  <>
                    <Fld label="المحافظة / الولاية" req={req('birthGov')} err={errs.birthGov}>
                      <select style={inp(errs.birthGov)} value={fd.birthGov} onChange={e => { uf('birthGov', e.target.value); uf('birthDistrict', ''); uf('address', ''); }}>
                        <option value="">اختر</option>
                        {Object.keys(worldGeoData[fd.country]).map(g => <option key={g} value={g}>{g}</option>)}
                      </select>
                    </Fld>
                    <Fld label="المديرية / المقاطعة" req={req('birthDistrict')} err={errs.birthDistrict}>
                      <select style={inp(errs.birthDistrict)} value={fd.birthDistrict} onChange={e => { uf('birthDistrict', e.target.value); uf('address', ''); }} disabled={!fd.birthGov}>
                        <option value="">اختر</option>
                        {fd.birthGov && worldGeoData[fd.country][fd.birthGov] ? Object.keys(worldGeoData[fd.country][fd.birthGov]).map(d => <option key={d} value={d}>{d}</option>) : null}
                      </select>
                    </Fld>
                    <div style={{gridColumn:'span 2'}}>
                      <Fld label="المنطقة / المدينة / الحي" req={req('address')} err={errs.address}>
                        <select style={inp(errs.address)} value={fd.address} onChange={e => uf('address', e.target.value)} disabled={!fd.birthDistrict}>
                          <option value="">اختر</option>
                          {fd.birthGov && fd.birthDistrict && worldGeoData[fd.country][fd.birthGov][fd.birthDistrict] ? worldGeoData[fd.country][fd.birthGov][fd.birthDistrict].map(r => <option key={r} value={r}>{r}</option>) : null}
                        </select>
                      </Fld>
                    </div>
                  </>
                ) : ( fd.country &&
                  <div style={{gridColumn:'span 2'}}>
                    <Fld label="المدينة / المقاطعة / التفاصيل" req={req('address')} err={errs.address}>
                      <input style={inp(errs.address)} value={fd.address} onChange={e => uf('address', e.target.value)} placeholder="أدخل تفاصيل العنوان كاملة"/>
                    </Fld>
                  </div>
                )}
                
                <div style={{gridColumn:'span 2', marginTop:10, paddingTop:10, borderTop:'1px solid #f1f5f9'}}>
                  <Fld label="نوع رقم الجوال">
                    <div style={{display:'flex', gap:10}}>
                      <label style={{flex:1, padding:'10px', background:fd.mobileType==='yemeni'?B.light:'#f8fafc', border:`1px solid ${fd.mobileType==='yemeni'?B.purple:'#e2e8f0'}`, borderRadius:8, textAlign:'center', cursor:'pointer'}}><input type="radio" checked={fd.mobileType==='yemeni'} onChange={()=>uf('mobileType','yemeni')} style={{display:'none'}}/><span style={{fontSize:14, fontWeight:800, color:fd.mobileType==='yemeni'?B.purple:'#64748b'}}>يمني</span></label>
                      <label style={{flex:1, padding:'10px', background:fd.mobileType==='intl'?B.light:'#f8fafc', border:`1px solid ${fd.mobileType==='intl'?B.purple:'#e2e8f0'}`, borderRadius:8, textAlign:'center', cursor:'pointer'}}><input type="radio" checked={fd.mobileType==='intl'} onChange={()=>uf('mobileType','intl')} style={{display:'none'}}/><span style={{fontSize:14, fontWeight:800, color:fd.mobileType==='intl'?B.purple:'#64748b'}}>دولي</span></label>
                    </div>
                  </Fld>
                  <Fld label="رقم الجوال" req={req('mobile')} err={errs.mobile} errMsg={errs.mobile}>
                    <div style={{display:'flex', direction:'ltr', gap:5}}>
                      {fd.mobileType === 'yemeni' ? (
                        <div style={{padding:'11px 16px', background:'#e2e8f0', borderRadius:'12px 0 0 12px', fontWeight:800, color:'#334155'}}>+967</div>

                        <select style={{...inp(), width:'120px', borderRadius:'12px 0 0 12px'}} value={fd.countryCode} onChange={e=>uf('countryCode', e.target.value)}>

                              Object.keys(regions).map(region => ({name: country, code: `+${region}`}))
                          ).map(c => <option key={c.code} value={c.code}>{c.name} ({c.code})</option>)}
                        </select>
                      )}
                      <input style={{...inp(errs.mobile), borderRadius:fd.mobileType==='yemeni'?'0 12px 12px 0':'0 12px 12px 0', letterSpacing:2, fontWeight:700, flex:1}} value={fd.mobile} onChange={e=>uf('mobile', e.target.value.replace(/[^\d]/g,''))} placeholder={fd.mobileType==='yemeni' ? "77xxxxxxxx" : "رقم الجوال"}/>
                    </div>
                  </Fld>
                </div>
                
                <Fld label="رقم الهاتف الثابت" req={req('phone')} err={errs.phone}><input style={inp(errs.phone)} value={fd.phone} onChange={e=>uf('phone', e.target.value)}/></Fld>
                <Fld label="البريد الإلكتروني" req={req('email')} err={errs.email}><input style={inp(errs.email)} value={fd.email} onChange={e=>uf('email', e.target.value)}/></Fld>
                <div style={{gridColumn:'span 2'}}><Fld label="الفرع المعتمد لفتح الحساب" req={req('branch')} err={errs.branch}><select style={inp(errs.branch)} value={fd.branch} onChange={e=>uf('branch', e.target.value)}><option value="">اختر الفرع</option>{settings.branches.map(b=><option key={b}>{b}</option>)}</select></Fld></div>
              </div>
            </div>}

            {/* STEP 5: SERVICES */}
            {step===5 && <div className="fade-in">
              <Fld label="العملات المطلوبة" req={req('currencies')} err={errs.currencies}><div style={{display:'flex', flexWrap:'wrap', gap:8, marginTop:8}}>{settings.currencies.map(c=><button key={c} onClick={()=>{const n = fd.currencies.includes(c) ? fd.currencies.filter(x=>x!==c) : [...fd.currencies, c]; uf('currencies', n);}} style={chip(fd.currencies.includes(c))}>{c}</button>)}</div></Fld>

                </h4>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
                  {[0, 1, 2].map(i => <SigBox key={i} id={i} label={`نموذج ${i + 1}`} val={fd.sampleSignatures[i]} />)}

              <h4 style={{ fontSize: 16, fontWeight: 900, color: B.purple, marginBottom: 10 }}>
                التوقيع الرئيسي للإقرار <span style={{ color: '#dc2626' }}>*</span>
              </h4>
              <SigBox id="main" label="اضغط هنا لاعتماد الطلب والتوقيع" val={fd.mainSignature} />
              {errs.mainSignature && <p style={{ color: '#dc2626', fontSize: 13, fontWeight: 700, marginTop: 8, textAlign: 'center' }}>⚠ {errs.mainSignature}</p>}
            </div>}

            {/* STEP 7: SMART ID UPLOAD */}
            {step===7 && <div className="fade-in">
              <h4 style={{fontSize:16, fontWeight:800, color:B.purple, marginBottom:16}}>المرفقات الرسمية المطلوبة ({fd.idType})</h4>
              <div style={{display:'grid', gridTemplateColumns: getPhotoConfig().length > 1 ? '1fr 1fr' : '1fr', gap:10, marginBottom:20}}>
                {getPhotoConfig().map(conf => (
                  <div key={conf.id} style={{border:`2px dashed ${fd.idPhotos[conf.id] ? '#16a34a' : '#cbd5e1'}`, borderRadius:16, padding:14, textAlign:'center', background:fd.idPhotos[conf.id]?'#f0fdf4':'#f8fafc'}}>
                    {fd.idPhotos[conf.id] ? (
                      <><img src={fd.idPhotos[conf.id]} style={{width:'100%', height:120, objectFit:'contain', borderRadius:8, marginBottom:8}} alt=""/><button onClick={()=>{const n={...fd.idPhotos}; delete n[conf.id]; uf('idPhotos', n);}} style={{padding:'6px 14px', background:'#fef2f2', color:'#dc2626', border:'none', borderRadius:8, fontSize:12, fontWeight:800}}>🗑 إزالة المرفق</button></>
                    ) : (
                      <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:10}}><i className="fas fa-id-card" style={{fontSize:32, color:'#94a3b8'}}/><span style={{fontSize:13, fontWeight:800, color:'#334155'}}>{conf.label}</span><div style={{display:'flex', gap:6, width:'100%'}}><label style={{flex:1, padding:'10px', background:B.purple, color:'white', borderRadius:8, fontSize:11, fontWeight:800, cursor:'pointer'}}><i className="fas fa-camera"/> التقاط<input type="file" accept="image/*" capture="environment" onChange={e=>handlePhoto(conf.id, e.target.files[0])} style={{display:'none'}}/></label><label style={{flex:1, padding:'10px', background:B.orange, color:'white', borderRadius:8, fontSize:11, fontWeight:800, cursor:'pointer'}}><i className="fas fa-folder-open"/> رفع<input type="file" accept="image/*" onChange={e=>handlePhoto(conf.id, e.target.files[0])} style={{display:'none'}}/></label></div></div>
                    )}
                  </div>
                ))}
              </div>
              {errs.photos && <div style={{padding:10, background:'#fef2f2', color:'#dc2626', borderRadius:10, fontSize:13, fontWeight:700, textAlign:'center', marginBottom:16}}>⚠ {errs.photos}</div>}
              
              <div style={{background:'#f0fdf4', border:'2px solid #bbf7d0', borderRadius:14, padding:16, textAlign:'center'}}>
                <h4 style={{fontSize:15, fontWeight:900, color:'#16a34a', margin:'0 0 10px'}}>الخطوة الأخيرة</h4>
                <button 
                  onClick={submitForm} 
                  style={{
                    width:'100%', padding:16, background: '#16a34a', color:'white', 
                    border:'none', borderRadius:12, fontSize:17, fontWeight:900, 
                    boxShadow:'0 8px 20px rgba(22,163,74,0.3)'
                  }}>
                  مراجعة وتأكيد الطلب 🚀
                </button>
              </div>
            </div>}
            
          </div>

          {/* Nav Buttons */}
          {step < T && <div style={{padding:'12px 24px 20px', display:'flex', gap:10}}>
            {step > 1 && <button onClick={()=>setStep(s=>s-1)} style={{padding:'12px 16px', background:'#f1f5f9', color:'#64748b', border:'none', borderRadius:12, fontSize:14, fontWeight:700}}>→ السابق</button>}
            <button onClick={nx} style={{flex:1, padding:14, background:B.purple, color:'white', border:'none', borderRadius:12, fontSize:15, fontWeight:900}}>{step===6 ? 'مراجعة المرفقات ←' : 'التالي ←'}</button>
          </div>}
        </div>
      </div>
    </div>
  );
};

const PDFDoc = ({f, op}) => {

      {/* Terms */}
      <div className="page-a4"><WM /><div className="content-wrapper" style={{padding: '15mm 20mm'}}><div className="title-box"><div className="main-title">شروط فتح حساب بغرض التعاملات المالية</div><div className="subtitle">بموجب الموافقة المبدئية من إدارة المنشأة على فتح حساب بغرض التحويل وصرافة العملات، فإنه لاستكمال فتح الحساب يجب استيفاء الشروط التالية:</div></div><ul className="terms-list"><li><strong>تعبئة الاستمارة:</strong> تعبئة استمارة (طلب فتح حساب) والتوقيع عليها مع إرفاق صورة البطاقة الشخصية بعد مطابقتها مع الأصل.</li><li><strong>نماذج التوقيعات:</strong> التوقيع على كرت التوقيعات أمام الموظف المختص حصراً.</li><li><strong>السجل التجاري:</strong> إرفاق السجل التجاري بالنسبة للوكلاء والعملاء (سواء كانوا أفراداً أو شركات) وبعد مطابقة الصورة مع الأصل وعلى أن يكون ساري المفعول.</li><li><strong>التفويض:</strong> التوقيع على استمارة التفويض الخاصة لمن سيدير الحسابات أو مندوبين تتم بواسطتهم التعاملات المالية.</li><li><strong>حسن التعامل:</strong> تعهد العميل بتجنب أي عمل أو تصرف يسيء إلى التعامل أو يضعف الثقة بينه وبين المنشأة.</li><li><strong>الغرض من الحساب:</strong> يتم فتح الحساب لغرض الإيداعات والتحويلات وعملية المصارفة فقط.</li><li><strong>الاستخدام المشروع:</strong> يُمنع استخدام الحساب لأي أغراض غير قانونية أو مخالفة للأنظمة المالية المعتمدة.</li><li><strong>مسؤولية المفوضين:</strong> يتحمل العميل كامل المسؤولية القانونية عن أي تعاملات تتم بواسطة الأشخاص المفوضين المدرجين في استمارة التفويض.</li><li><strong>صلاحية الإغلاق:</strong> للمنشأة الحق في إغلاق الحساب وعدم قبول أي إيداع أو تحويل في حالة أن العميل لم يلتزم بما هو متفق عليه أو تجاوز حسابه العمليات الحسابية المعتادة.</li><li><strong>العنوان الرسمي:</strong> يعتبر العنوان الذي تعطونه في بياناتكم هو العنوان الرسمي لكم، وتتحملون مسؤولية تغييره دون إخطار خطي بذلك.</li><li><strong>الإقرار بصحة البيانات:</strong> يقر طالب فتح الحساب بأن جميع البيانات الواردة في استمارة فتح الحساب صحيحة.</li></ul><div className="declaration-section"><div className="declaration-text">تم الاطلاع على الشروط أعلاه والموافقة عليها</div><div className="signature-row"><div className="sig-block"><span className="sig-label">اسم العميل:</span><div className="sig-input">{f.fullName}</div></div><div className="sig-block" style={{textAlign: 'left'}}><span className="sig-label">التوقيع:</span><div className="sig-input" style={{justifyContent: 'center'}}>{f.mainSignature && <img src={f.mainSignature} style={{height: 28}} alt="Signature" />}</div></div></div></div><FT pg={2} /></div><DM /></div>

 'span 3'}}><span className="label">تاريخ الانتهاء:</span><div className="input">{f.idExpiry}</div></div><div className="field-group" style={{gridColumn: 'span 9'}}><span className="label">الجنسية / تاريخ الميلاد:</span><div className="input">{f.country || 'يمني'} | {f.birthDate || '—'}</div></div></div></div><div className="section-container"><div className="section-label"><i className="fas fa-map-marker-alt" /> 2. العنوان وبيانات الاتصال</div><div className="fields-grid"><div className="field-group" style={{gridColumn: 'span 12'}}><span className="label">العنوان التفصيلي:</span><div className="input">{[f.country, f.birthGov, f.birthDistrict, f.address].filter(Boolean).join(' - ')}</div></div><div className="field-group" style={{gridColumn: 'span 3'}}><span className="label">رقم الجوال:</span><div className="input" style={{direction:'ltr'}}>{f.mobile}</div></div><div className="field-group" style={{gridColumn: 'span 3'}}><span className="label">رقم الهاتف:</span><div className="input">{f.phone || '—'}</div></div><div className="field-group" style={{gridColumn: 'span 6'}}><span className="label">البريد الإلكتروني:</span><div className="input">{f.email || '—'}</div></div></div></div><div className="compact-row"><div className="section-container"><div className="section-label"><i className="fas fa-coins" /> 3. عملات الحساب</div><div className="checkbox-row">{s?.currencies?.map(c => <div key={c} className="checkbox-item"><Chk on={f.currencies?.includes(c)} /> {c}</div>)}</div></div><div className="section-container"><div className="section-label"><i className="fas fa-headset" /> 4. وسائل طلب الخدمة</div><div className="checkbox-row">{s?.services?.map(sv => <div key={sv} className="checkbox-item"><Chk on={f.services?.includes(sv)} /> {sv}</div>)}</div></div></div><div className="signatures-container-p3"><div className="section-label"><i className="fas fa-signature" /> 5. نماذج توقيعات العميل المعتمدة</div><div className="sig-grid">{[0, 1, 2].map(i => <div key={i} className="page-3-sig-card"><div className="sig-card-header">توقيع معتمد ({i + 1})</div>{f.sampleSignatures?.[i] && <img src={f.sampleSignatures[i]} style={{maxHeight: 120, maxWidth: '90%'}} alt="" />}</div>)}</div><FT pg={3} /></div></div><DM /></div>

      {/* Authorized */}
      <div className="page-a4"><WM /><div className="content-wrapper" style={{padding: '10mm 15mm', gap: '20px', justifyContent: 'space-between'}}><div className="page-header"><div className="header-title">استمارة طلب فتح حساب (المفوضين والموافقات)</div></div><div><div className="section-label"><i className="fas fa-users-cog" /> 6. بيانات الأشخاص المفوضين والصلاحيات الممنوحة</div><div className="auth-table-container"><table className="auth-table"><thead><tr><th width="30%">بيانات المفوض</th><th width="45%">الصلاحيات المحددة</th><th width="25%">نموذج التوقيع</th></tr></thead><tbody>{[0, 1].map(i => {const a = f.authorized?.[i] || {}; const perms = ['السحب النقدي / إرسال الحوالات','الاطلاع على الرصيد','طلب كشف حساب','التحويل لأشخاص آخرين','التواصل لإرسال/طلب حوالات','كافة الصلاحيات']; return (<tr key={i}><td><div style={{marginBottom: 8}}><strong>الاسم:</strong> {a.name || '....................................'}</div><div style={{marginBottom: 8}}><strong>رقم الهوية:</strong> {a.id || '..............................'}</div><div style={{marginBottom: 8}}><strong>الهاتف:</strong> {a.phone || '....................................'}</div></td><td><div className="permission-grid">{perms.map(p => <div key={p} className="perm-item"><Chk on={a.permissions?.includes(p)} /> {p.substring(0,20)}</div>)}</div></td><td style={{verticalAlign: 'middle', textAlign: 'center'}}><div style={{height: 100, border: '1px dashed #999', marginTop: 5, background: '#fdfdfd', borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'center'}}>{a.signature && <img src={a.signature} style={{maxHeight: 90, maxWidth: '90%'}} alt="" />}</div></td></tr>);})}</tbody></table></div><div className="legal-note"><i className="fas fa-exclamation-triangle" /> يتحمل صاحب الحساب المسؤولية القانونية الكاملة عن تعاملات المفوضين.</div></div><div className="approval-section"><div className="section-label"><i className="fas fa-file-signature" /> 7. إقرار وموافقة العميل (صاحب الحساب)</div><div className="approval-text">أقر أنا الموقع أدناه بصحة كافة البيانات الواردة في هذا الطلب، وأوافق على تفويض الأشخاص المذكورين، كما أقر باطلاعي وموافقتي على الشروط والأحكام العامة لفتح الحساب والالتزام بها.</div><div style={{borderTop: '1px solid #ddd', margin: '10px 0'}} /><div className="approval-grid"><div className="field-line"><span className="lbl">الاسم الكامل (الرباعي):</span><div className="line">{f.fullName}</div></div><div className="field-line"><span className="lbl">التوقيع المعتمد:</span><div className="line" style={{justifyContent: 'center'}}>{f.mainSignature && <img src={f.mainSignature} style={{height: 28}} alt="" />}</div></div><div className="field-line"><span className="lbl">التاريخ:</span><div className="line">{td}</div></div></div></div><div className="employee-auth"><div style={{fontSize: 12, fontWeight: 700, width: '50%'}}><i className="fas fa-user-check" /> مصادقة الموظف المختص:<div style={{fontWeight: 400, marginTop: 5, fontSize: 11}}>تم التوقيع أمامي والمطابقة مع أصل الهوية.</div></div><div style={{display: 'flex', gap: 20, width: '45%'}}><div className="field-line"><span className="lbl">اسم الموظف:</span><div className="line">{op?.username || op?.email}</div></div><div className="field-line"><span className="lbl">التوقيع:</span><div className="line" style={{height: 40}}></div></div></div></div><div className="admin-decision"><div className="admin-title">قرار الإدارة (للاستخدام الرسمي فقط)</div><div className="admin-grid"><div className="field-line" style={{textAlign: 'center'}}><div className="line"></div><span className="lbl" style={{color: 'var(--brand-purple)'}}>مدير الفرع</span></div><div className="stamp-box">ختم المنشأة<br />(الرسمي)</div><div className="field-line" style={{textAlign: 'center'}}><div className="line"></div><span className="lbl" style={{color: 'var(--brand-purple)'}}>اعتماد المدير العام</span><div className="line" style={{marginTop: 10, width: 100, marginRight: 'auto', marginLeft: 'auto'}}></div><span className="lbl" style={{fontSize: 9}}>التاريخ</span></div></div></div><FT pg={4} /></div><DM /></div>

      {/* ID Attachments */}
      <div className="page-a4"><div className="content-wrapper" style={{padding: '10mm 15mm'}}><div className="page-header" style={{borderBottom: '3px solid var(--brand-orange)'}}><div className="header-title" style={{color: 'var(--brand-orange)'}}>المرفقات الرسمية (صورة الهوية)</div><div className="header-meta"><div className="meta-field" style={{background: '#f9f9f9', border: '1px solid #ccc'}}>رقم الهوية: {f.idNumber || '—'}</div></div></div><div style={{flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: '#f8fafc', border: '2px dashed #cbd5e1', borderRadius: '16px', padding: '20px', gap:'20px'}}>{f.idPhotos && Object.values(f.idPhotos).length > 0 ? (Object.values(f.idPhotos).map((photo, i) => (<img key={i} src={photo} style={{maxWidth: '100%', maxHeight: Object.values(f.idPhotos).length > 1 ? '110mm' : '230mm', objectFit: 'contain', borderRadius: '8px', boxShadow: '0 10px 25px rgba(0,0,0,0.1)'}} alt={`مرفق ${i+1}`} />))) : (<div style={{color: '#94a3b8', textAlign: 'center'}}><i className="fas fa-id-card" style={{fontSize: '64px', marginBottom: '15px', color: '#e2e8f0'}} /><h3 style={{margin: 0, fontSize: '18px'}}>لم يتم إرفاق صورة للهوية</h3><p style={{margin: '5px 0 0', fontSize: '13px'}}>يجب استيفاء هذه الورقة وضمها لملف العميل.</p></div>)}</div><FT pg={5} /></div><DM /></div>
    </div>
  );
};

// ============ APP ============
const App = () => {
  const [user, setUser] = useState(null);
  const [showClientForm, setShowClientForm] = useState(false);
  if(showClientForm) return <ClientForm onBack={()=>setShowClientForm(false)}/>;
  if(user) return <AdminPanel user={user} onLogout={()=>setUser(null)}/>;
  return <LoginScreen onLogin={setUser} onPublicForm={()=>setShowClientForm(true)}/>;
};
ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
